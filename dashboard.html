<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Content Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07090F; --s1:#0D1018; --s2:#111520; --s3:#161C2C;
  --border:#1C2438; --border2:#263048;
  --accent:#4DFFA0; --accent2:#4D9FFF; --accent3:#FF6B4D;
  --text:#DCE6F8; --muted:#4A5A7A; --muted2:#6A7A9A;
  --success:#4DFFA0; --warn:#FFB84D; --error:#FF4D6B;
  --mono:'Space Mono',monospace; --sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,#1C2A4A 1px,transparent 1px);background-size:28px 28px;opacity:0.3;pointer-events:none;z-index:0;}

/* Header */
.header{position:sticky;top:0;z-index:100;background:rgba(7,9,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;}
.header-title{font-family:var(--mono);font-size:15px;font-weight:700;color:#fff;}
.header-title span{color:var(--accent);}
.header-meta{font-size:11px;color:var(--muted2);margin-left:4px;}
.header-actions{margin-left:auto;display:flex;gap:8px;}

/* Plan selector */
.plan-selector{position:relative;z-index:1;padding:16px 24px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.plan-selector select{background:var(--s2);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:8px 12px;font-family:var(--mono);font-size:11px;cursor:pointer;}
.plan-stats{display:flex;gap:16px;margin-left:auto;}
.plan-stat{text-align:center;}
.plan-stat .n{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--accent);}
.plan-stat .l{font-size:10px;color:var(--muted2);margin-top:2px;}
.plan-stat .n.blue{color:var(--accent2);}
.plan-stat .n.orange{color:var(--accent3);}

/* Gen-all bar */
.gen-bar{position:relative;z-index:1;padding:12px 24px;background:rgba(77,255,160,0.04);border-bottom:1px solid rgba(77,255,160,0.1);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.gen-progress{flex:1;min-width:200px;height:4px;background:var(--s3);border-radius:2px;overflow:hidden;}
.gen-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;transition:width 0.5s;width:0%;}
.gen-status{font-family:var(--mono);font-size:10px;color:var(--accent);min-width:120px;}

/* Calendar grid */
.calendar{position:relative;z-index:1;padding:24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}

/* Day card */
.day-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color 0.2s,transform 0.2s;}
.day-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.day-card.has-image{border-color:rgba(77,255,160,0.2);}
.day-card.generating{border-color:var(--accent2);animation:cardPulse 1.5s infinite;}
@keyframes cardPulse{0%,100%{box-shadow:0 0 0 0 rgba(77,159,255,0.3);}50%{box-shadow:0 0 0 4px rgba(77,159,255,0);}}

.card-header{padding:10px 12px;background:var(--s2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.card-day{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);}
.card-type-badge{font-size:9px;padding:2px 8px;border-radius:3px;font-family:var(--mono);font-weight:700;text-transform:uppercase;}
.badge-single{background:rgba(77,159,255,0.15);color:var(--accent2);}
.badge-carousel{background:rgba(255,107,77,0.15);color:var(--accent3);}
.badge-story{background:rgba(77,255,160,0.12);color:var(--accent);}
.badge-reel-cover{background:rgba(255,184,77,0.15);color:var(--warn);}
.card-status{margin-left:auto;font-size:9px;color:var(--muted);font-family:var(--mono);}
.card-status.ready{color:var(--accent);}
.card-status.generating{color:var(--accent2);}

/* Image preview area */
.card-preview{position:relative;background:var(--s3);min-height:140px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.card-preview img{width:100%;height:auto;max-height:260px;object-fit:cover;display:block;}
.card-preview.carousel-preview{display:flex;gap:2px;}
.card-preview.carousel-preview img{flex:1;min-width:0;height:180px;object-fit:cover;}
.preview-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;padding:24px;opacity:0.4;}
.preview-placeholder .icon{font-size:28px;}
.preview-placeholder .txt{font-family:var(--mono);font-size:9px;color:var(--muted);text-align:center;}
.preview-gen-overlay{position:absolute;inset:0;background:rgba(7,9,15,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.gen-spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent2);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.gen-overlay-text{font-family:var(--mono);font-size:10px;color:var(--accent2);text-align:center;max-width:160px;}

/* Card body */
.card-body{padding:12px;}
.card-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:6px;}
.card-caption{font-size:11px;color:var(--muted2);line-height:1.5;margin-bottom:8px;max-height:48px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
.card-hashtags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.hashtag{font-size:9px;color:var(--accent2);font-family:var(--mono);opacity:0.7;}
.card-prompt{font-size:10px;color:var(--muted);line-height:1.4;font-style:italic;padding:6px 8px;background:var(--s3);border-radius:4px;border-left:2px solid var(--border2);margin-bottom:10px;max-height:44px;overflow:hidden;cursor:pointer;}
.card-prompt:hover{max-height:none;border-left-color:var(--accent2);}

/* Card actions */
.card-actions{display:flex;gap:6px;flex-wrap:wrap;}
.btn{background:var(--s3);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:5px;font-family:var(--mono);font-size:9px;cursor:pointer;transition:all .15s;font-weight:700;}
.btn:hover{background:var(--s2);border-color:var(--border2);}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-generate{background:transparent;color:var(--accent2);border-color:rgba(77,159,255,0.3);}
.btn-generate:hover{background:rgba(77,159,255,0.08);border-color:var(--accent2);}
.btn-generate:disabled{color:var(--muted);border-color:var(--border);}
.btn-edit-prompt{color:var(--muted2);}
.btn-view-caption{color:var(--accent3);border-color:rgba(255,107,77,0.2);}
.btn-download{color:var(--accent);border-color:rgba(77,255,160,0.2);}
.btn-danger{color:var(--error);border-color:rgba(255,77,107,0.2);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:600px;max-height:80vh;overflow-y:auto;}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.modal-title{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:700;}
.modal-close{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px;}
.modal-label{font-family:var(--mono);font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.modal-textarea{width:100%;background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:10px 12px;font-family:var(--sans);font-size:12px;resize:vertical;min-height:80px;outline:none;line-height:1.6;}
.modal-textarea:focus{border-color:var(--accent2);}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}

/* Header/bar buttons */
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.btn-primary:hover{background:#3AEEAA;}
.btn-primary:disabled{background:var(--s3);color:var(--muted);border-color:var(--border);}
.btn-stop{background:transparent;color:var(--error);border-color:rgba(255,77,107,0.3);}
.btn-stop:hover{background:rgba(255,77,107,0.08);border-color:var(--error);}

.empty-state{position:relative;z-index:1;text-align:center;padding:80px 24px;color:var(--muted);}
.empty-state h2{font-family:var(--mono);font-size:20px;color:var(--muted2);margin-bottom:12px;}

/* Carousel slide list */
.slides-list{display:flex;flex-direction:column;gap:4px;margin-top:6px;}
.slide-item{display:flex;align-items:center;gap:6px;padding:4px 6px;background:var(--s3);border-radius:4px;font-size:10px;color:var(--muted2);}
.slide-num{font-family:var(--mono);font-size:9px;color:var(--accent);min-width:20px;}
.slide-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.slide-status{font-size:9px;color:var(--muted);}
.slide-status.done{color:var(--accent);}

.toast{position:fixed;bottom:24px;right:24px;background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:10px 16px;font-family:var(--mono);font-size:11px;z-index:2000;transform:translateY(20px);opacity:0;transition:all 0.3s;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:rgba(77,255,160,0.4);color:var(--accent);}
.toast.error{border-color:rgba(255,77,107,0.4);color:var(--error);}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Content <span>Dashboard</span></div>
  <span class="header-meta" id="planMeta">Loading...</span>
  <div class="header-actions">
    <button class="btn btn-primary" id="genAllBtn" disabled>⚡ Generate All Images</button>
    <button class="btn btn-stop" id="stopGenBtn" style="display:none;">■ Stop</button>
    <button class="btn btn-primary" id="saveDbBtn" style="background:var(--accent2);">💾 Save Images to DB</button>
    <button class="btn" id="refreshBtn">↻ Refresh</button>
    <button class="btn btn-danger" id="deletePlanBtn" title="Delete entire plan">🗑 Delete Plan</button>
  </div>
</div>

<div class="plan-selector">
  <span style="font-family:var(--mono);font-size:10px;color:var(--muted);">PLAN</span>
  <select id="planSelect"></select>
  <div class="plan-stats">
    <div class="plan-stat"><div class="n" id="statTotal">0</div><div class="l">Posts</div></div>
    <div class="plan-stat"><div class="n blue" id="statImages">0</div><div class="l">Images</div></div>
    <div class="plan-stat"><div class="n orange" id="statPending">0</div><div class="l">Pending</div></div>
  </div>
</div>

<div class="gen-bar" id="genBar" style="display:none;">
  <span class="gen-status" id="genStatus">Ready</span>
  <div class="gen-progress"><div class="gen-progress-fill" id="genProgressFill"></div></div>
  <span style="font-family:var(--mono);font-size:10px;color:var(--muted2);" id="genFraction">0/0</span>
</div>

<div class="calendar" id="calendar">
  <div class="empty-state">
    <h2>No plan loaded</h2>
    <p>Generate ideas in the side panel first, then come back here.</p>
  </div>
</div>

<!-- Edit Prompt Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="editModalTitle">Edit Image Prompt</span>
      <button class="modal-close" id="editModalClose">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="modal-label">Post Type</div>
        <select id="editTypeSelect" style="background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:6px 10px;font-family:var(--mono);font-size:11px;width:100%;">
          <option value="single">Single Post (1080×1080)</option>
          <option value="carousel">Carousel (1080×1350)</option>
          <option value="story">Story (1080×1920)</option>
          <option value="reel-cover">Reel Cover (1080×1920)</option>
        </select>
      </div>
      <div>
        <div class="modal-label">Image Prompt (sent to AI designer)</div>
        <textarea class="modal-textarea" id="editPromptInput" rows="5" placeholder="Describe the visual: colors, mood, composition, elements..."></textarea>
      </div>
      <div>
        <div class="modal-label">Caption</div>
        <textarea class="modal-textarea" id="editCaptionInput" rows="3"></textarea>
      </div>
      <div>
        <div class="modal-label">Hashtags (comma separated, no #)</div>
        <textarea class="modal-textarea" id="editHashtagsInput" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="editModalCancel">Cancel</button>
      <button class="btn btn-primary" id="editModalSave">Save Changes</button>
      <button class="btn btn-generate" id="editModalGenerate">Save + Generate Image</button>
    </div>
  </div>
</div>

<!-- Caption Modal -->
<div class="modal-overlay" id="captionModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="captionModalTitle">Caption &amp; Hashtags</span>
      <button class="modal-close" id="captionModalClose">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="modal-label">Caption</div>
        <textarea class="modal-textarea" id="captionModalText" rows="6" readonly></textarea>
      </div>
      <div>
        <div class="modal-label">Hashtags</div>
        <textarea class="modal-textarea" id="captionModalHashtags" rows="3" readonly></textarea>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-view-caption" id="copyCaptionBtn">Copy Caption</button>
        <button class="btn btn-view-caption" id="copyHashtagsBtn">Copy Hashtags</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- FIX: hidden same-origin bridge to the Designer page. dashboard.js
     now talks to window.ContentDesignerAPI / window.DesignerAgentAPI
     inside this iframe directly (no postMessage needed, same origin)
     instead of chrome.runtime.sendMessage, which only existed in the
     Chrome-extension build and had no web equivalent at all. -->
<iframe id="designerBridge" src="designer.html" title="designer-bridge"
        style="position:fixed;width:1px;height:1px;border:0;opacity:0;pointer-events:none;left:-9999px;top:-9999px;"></iframe>

<script src="dashboard.js"></script>
</body>
</html>
