    function toast(msg, type = 'success') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `toast show ${type === 'error' ? 'error' : ''}`;
        setTimeout(() => el.className = 'toast', 3200);
    }

    async function storageGet(key, fallback = null) {
        try {
            const res = await window.storage.get(key, false);
            return res ? JSON.parse(res.value) : fallback;
        } catch (e) { return fallback; }
    }
    async function storageSet(key, value) {
        try { await window.storage.set(key, JSON.stringify(value), false); } catch (e) { console.error('storage set failed', e); }
    }

    // ================================================================
    // DATE HELPERS — "Day N" maps onto a real calendar date
    // ================================================================
    function pad2(n) { return String(n).padStart(2, '0'); }
    function isoDate(d) { return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`; }
    function parseISO(str) {
        const [y, m, d] = str.split('-').map(Number);
        return new Date(y, m - 1, d);
    }
    function defaultStartDate() {
        const t = new Date();
        return isoDate(new Date(t.getFullYear(), t.getMonth(), 1)); // 1st of current month
    }
    function dateForDay(dayNum) {
        const start = parseISO(calendarConfig.startDate || defaultStartDate());
        return new Date(start.getFullYear(), start.getMonth(), start.getDate() + (dayNum - 1));
    }
    function fmtShort(d) { return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }); }
    function fmtFull(d) { return d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }); }
    function daysBetween(a, b) {
        const A = new Date(a.getFullYear(), a.getMonth(), a.getDate());
        const B = new Date(b.getFullYear(), b.getMonth(), b.getDate());
        return Math.round((B - A) / 86400000);
    }
    function currentDayIndex() {
        const start = parseISO(calendarConfig.startDate || defaultStartDate());
        const idx = daysBetween(start, new Date()) + 1;
        return Math.max(1, Math.min(31, idx));
    }

    async function loadData() {
        const stored = await storageGet('contentData', null);
        if (stored && Array.isArray(stored) && stored.length) {
            contentData = stored;
        } else {
            contentData = addDemoData();
            await storageSet('contentData', contentData);
        }

        const cfg = await storageGet('calendarConfig', null);
        if (cfg && cfg.startDate) {
            calendarConfig = cfg;
        } else {
            calendarConfig = { startDate: defaultStartDate() };
            await storageSet('calendarConfig', calendarConfig);
        }

        designImages = {};
        try {
            const list = await window.storage.list('design:', false);
            if (list && list.keys) {
                for (const key of list.keys) {
                    const id = key.replace('design:', '');
                    const res = await window.storage.get(key, false);
                    if (res) designImages[id] = res.value;
                }
            }
        } catch (e) { /* no designs yet */ }
    }

    async function saveData() {
        await storageSet('contentData', contentData);
        renderCalendar();
    }

    async function saveCalendarConfig() {
        await storageSet('calendarConfig', calendarConfig);
        renderCalendar();
    }

    function getDayData(day) { return contentData.filter(item => item.day === day); }

    async function addContent(item) { contentData.push(item); await saveData(); }
    async function updateContent(id, updated) {
        const index = contentData.findIndex(item => item.id === id);
        if (index !== -1) { contentData[index] = { ...contentData[index], ...updated }; await saveData(); }
    }
    async function deleteContent(id) {
        contentData = contentData.filter(item => item.id !== id);
        await saveData();
    }

    function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

    // ================================================================
    // RENDER CALENDAR
    // ================================================================
    let currentView = 'month';

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.className = `calendar-grid ${currentView}-view`;
        grid.innerHTML = '';

        let daysToShow = [];
        const rangeLabel = document.getElementById('rangeLabel');

        if (currentView === 'month') {
            for (let d = 1; d <= 31; d++) daysToShow.push(d);
            rangeLabel.textContent = `${fmtShort(dateForDay(1))} – ${fmtShort(dateForDay(31))}`;
        } else if (currentView === 'week') {
            const idx = currentDayIndex();
            const start = Math.max(1, Math.min(25, idx - 3));
            const end = Math.min(31, start + 6);
            for (let d = start; d <= end; d++) daysToShow.push(d);
            rangeLabel.textContent = `${fmtShort(dateForDay(start))} – ${fmtShort(dateForDay(end))}`;
        } else {
            const idx = currentDayIndex();
            daysToShow = [idx];
            rangeLabel.textContent = fmtFull(dateForDay(idx));
        }

        daysToShow.forEach(day => {
            const items = getDayData(day);
            const card = document.createElement('div');
            card.className = 'day-card';

            const dayHeader = document.createElement('div');
            dayHeader.className = 'day-number';
            dayHeader.innerHTML = `<span>Day ${day}</span> <small>${items.length} items</small>`;
            card.appendChild(dayHeader);

            const dateLine = document.createElement('div');
            dateLine.className = 'day-date';
            dateLine.textContent = fmtShort(dateForDay(day));
            card.appendChild(dateLine);

            if (items.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'text-muted';
                empty.style.padding = '8px 0';
                empty.textContent = 'No content planned';
                card.appendChild(empty);
            } else {
                items.forEach(item => {
                    const wrapper = document.createElement('div');
                    wrapper.style.marginBottom = '12px';
                    wrapper.style.borderBottom = '1px solid #f1f5f9';
                    wrapper.style.paddingBottom = '10px';

                    const raw = document.createElement('div');
                    raw.className = 'topic-raw';
                    raw.textContent = `📌 ${item.raw}`;
                    wrapper.appendChild(raw);

                    const refined = document.createElement('div');
                    refined.className = 'topic-title';
                    refined.textContent = item.refined || item.raw;
                    wrapper.appendChild(refined);

                    const tagRow = document.createElement('div');
                    tagRow.className = 'flex gap-1';

                    if (item.audience) {
                        const audTag = document.createElement('span');
                        audTag.className = `audience-tag aud-${item.audience}`;
                        audTag.textContent = item.audience;
                        tagRow.appendChild(audTag);
                    }

                    (item.platforms || ['all']).forEach(p => {
                        const tag = document.createElement('span');
                        tag.className = `platform-tag tag-${p}`;
                        tag.textContent = p.toUpperCase();
                        tagRow.appendChild(tag);
                    });
                    wrapper.appendChild(tagRow);

                    if (item.hook) {
                        const hook = document.createElement('div');
                        hook.className = 'hook-text';
                        hook.innerHTML = `<i class="fas fa-bolt" style="color:#2563eb;margin-right:6px;"></i> ${item.hook}`;
                        wrapper.appendChild(hook);
                    }

                    if (item.description) {
                        const desc = document.createElement('div');
                        desc.className = 'desc-text';
                        desc.textContent = item.description;
                        wrapper.appendChild(desc);
                    }

                    if (item.cta) {
                        const cta = document.createElement('div');
                        cta.className = 'cta-text';
                        cta.innerHTML = `<i class="fas fa-arrow-right" style="margin-right:6px;"></i> ${item.cta}`;
                        wrapper.appendChild(cta);
                    }

                    if (item.hashtags) {
                        const hash = document.createElement('div');
                        hash.className = 'hashtags';
                        hash.textContent = item.hashtags;
                        wrapper.appendChild(hash);
                    }

                    if (designImages[item.id]) {
                        const thumb = document.createElement('img');
                        thumb.className = 'design-thumb';
                        thumb.src = designImages[item.id];
                        thumb.title = 'Open Planner to edit this design';
                        wrapper.appendChild(thumb);
                    }

                    const actions = document.createElement('div');
                    actions.className = 'flex';
                    actions.style.marginTop = '8px';
                    const editBtn = document.createElement('button');
                    editBtn.className = 'btn btn-sm btn-outline';
                    editBtn.innerHTML = '<i class="fas fa-edit"></i>';
                    editBtn.onclick = () => openEditModal(item.id);
                    const delBtn = document.createElement('button');
                    delBtn.className = 'btn btn-sm btn-danger';
                    delBtn.innerHTML = '<i class="fas fa-trash"></i>';
                    delBtn.onclick = () => { if(confirm('Delete this?')) deleteContent(item.id); };
                    actions.appendChild(editBtn);
                    actions.appendChild(delBtn);
                    wrapper.appendChild(actions);
                    card.appendChild(wrapper);
                });
            }

            const addBtn = document.createElement('button');
            addBtn.className = 'btn btn-sm btn-outline';
            addBtn.style.marginTop = '4px';
            addBtn.innerHTML = '<i class="fas fa-plus"></i> Add to this day';
            addBtn.onclick = () => openAddModal(day);
            card.appendChild(addBtn);
            grid.appendChild(card);
        });
    }

    // ================================================================
    // MODAL LOGIC
    // ================================================================
    let isEditing = false;
    let editId = null;

    function openAddModal(day = null) {
        isEditing = false;
        editId = null;
        document.getElementById('modalTitle').textContent = 'Add Content';
        document.getElementById('editId').value = '';
        document.getElementById('formDay').value = day || currentDayIndex();
        document.getElementById('formRaw').value = '';
        document.getElementById('formRefined').value = '';
        document.getElementById('formAudience').value = '';
        document.getElementById('formPlatforms').value = 'ig, yt, li';
        document.getElementById('formHook').value = '';
        document.getElementById('formDesc').value = '';
        document.getElementById('formCta').value = '';
        document.getElementById('formHashtags').value = '';
        document.getElementById('modalOverlay').classList.add('show');
    }

    function openEditModal(id) {
        const item = contentData.find(d => d.id === id);
        if (!item) return;
        isEditing = true;
        editId = id;
        document.getElementById('modalTitle').textContent = 'Edit Content';
        document.getElementById('editId').value = id;
        document.getElementById('formDay').value = item.day;
        document.getElementById('formRaw').value = item.raw || '';
        document.getElementById('formRefined').value = item.refined || '';
        document.getElementById('formAudience').value = item.audience || '';
        document.getElementById('formPlatforms').value = (item.platforms || []).join(', ');
        document.getElementById('formHook').value = item.hook || '';
        document.getElementById('formDesc').value = item.description || '';
        document.getElementById('formCta').value = item.cta || '';
        document.getElementById('formHashtags').value = item.hashtags || '';
        document.getElementById('modalOverlay').classList.add('show');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('show');
    }

    async function saveFromModal() {
        const day = Math.max(1, Math.min(31, parseInt(document.getElementById('formDay').value) || 1));
        const raw = document.getElementById('formRaw').value.trim();
        const refined = document.getElementById('formRefined').value.trim();
        const audience = document.getElementById('formAudience').value.trim().toLowerCase();
        const platforms = document.getElementById('formPlatforms').value.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
        const hook = document.getElementById('formHook').value.trim();
        const description = document.getElementById('formDesc').value.trim();
        const cta = document.getElementById('formCta').value.trim();
        const hashtags = document.getElementById('formHashtags').value.trim();

        if (!raw) { alert('Raw idea is required'); return; }

        const data = { day, raw, refined, audience, platforms, hook, description, cta, hashtags };

        if (isEditing && editId) {
            await updateContent(editId, data);
        } else {
            data.id = genId();
            await addContent(data);
        }
        closeModal();
    }

    // ================================================================
    // IMPORT / EXPORT / REFRESH
    // ================================================================
    function exportData() {
        const blob = new Blob([JSON.stringify(contentData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `content-planner-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importData(file) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    contentData = imported;
                    await saveData();
                    toast('Import successful!');
                } else {
                    toast('Invalid JSON format. Expected an array.', 'error');
                }
            } catch(err) {
                toast('Error parsing JSON: ' + err.message, 'error');
            }
        };
        reader.readAsText(file);
    }

    async function refreshData() {
        await loadData();
        renderCalendar();
        toast('Reloaded from storage');
    }

    // ================================================================
    // VIEW TOGGLE
    // ================================================================
    function setView(view) {
        currentView = view;
        document.querySelectorAll('.view-toggle .btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.view-toggle .btn[data-view="${view}"]`).classList.add('active');
        renderCalendar();
    }

    // ================================================================
    // INIT
    // ================================================================
    document.addEventListener('DOMContentLoaded', async function() {
        await loadData();
        document.getElementById('startDateInput').value = calendarConfig.startDate;
        renderCalendar();

        document.querySelectorAll('.view-toggle .btn').forEach(btn => {
            btn.addEventListener('click', () => setView(btn.dataset.view));
        });

        document.getElementById('startDateInput').addEventListener('change', async (e) => {
            if (!e.target.value) return;
            calendarConfig.startDate = e.target.value;
            await saveCalendarConfig();
        });

        document.getElementById('refreshData').addEventListener('click', refreshData);
        document.getElementById('openAddModal').addEventListener('click', () => openAddModal());
        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('saveContent').addEventListener('click', saveFromModal);
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        document.getElementById('exportData').addEventListener('click', exportData);
        document.getElementById('importData').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });
        document.getElementById('fileInput').addEventListener('change', (e) => {
            if (e.target.files.length) {
                importData(e.target.files[0]);
                e.target.value = '';
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    });
</script>
