<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Planner · 31 Day Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6fa;
            color: #1e1e2f;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            max-width: 1440px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 28px 32px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.4);
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            gap: 16px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 600;
            background: linear-gradient(145deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 i { font-size: 28px; background: none; -webkit-text-fill-color: #2563eb; }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 60px;
            font-weight: 500;
            font-size: 14px;
            background: white;
            color: #1e1e2f;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: #2563eb; color: white; border: none; box-shadow: 0 4px 12px rgba(37,99,235,0.25); }
        .btn-primary:hover { background: #1d4ed8; transform: scale(0.97); }
        .btn-outline { background: transparent; border: 1px solid #cbd5e1; }
        .btn-outline:hover { background: #f1f5f9; }
        .btn-success { background: #059669; color: white; border: none; }
        .btn-danger { background: #dc2626; color: white; border: none; }
        .btn-sm { padding: 4px 14px; font-size: 12px; }
        .btn-refresh { background: #8b5cf6; color: white; border: none; }
        .btn-refresh:hover { background: #7c3aed; }

        .view-toggle {
            display: flex;
            gap: 4px;
            background: #f1f5f9;
            border-radius: 60px;
            padding: 4px;
        }
        .view-toggle .btn {
            border-radius: 40px;
            border: none;
            background: transparent;
            padding: 6px 16px;
            font-weight: 500;
            font-size: 13px;
        }
        .view-toggle .btn.active {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .nav-controls {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .nav-controls .btn {
            padding: 6px 12px;
            font-size: 13px;
        }
        .nav-label {
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            min-width: 80px;
            text-align: center;
        }

        .calendar-grid {
            display: grid;
            gap: 14px;
            margin-top: 12px;
        }
        .month-view { grid-template-columns: repeat(5, 1fr); }
        .week-view { grid-template-columns: repeat(7, 1fr); }
        .day-view { grid-template-columns: 1fr; }

        .day-card {
            background: white;
            border-radius: 20px;
            padding: 16px 14px;
            border: 1px solid #eef2f6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.25s ease;
            animation: fadeUp 0.3s ease forwards;
        }
        .day-card:hover { border-color: #cbd5e1; box-shadow: 0 8px 24px rgba(0,0,0,0.04); transform: translateY(-3px); }
        .day-number {
            font-weight: 600;
            font-size: 18px;
            color: #1e293b;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .day-number small { font-weight: 400; font-size: 13px; color: #64748b; }
        .topic-title {
            font-weight: 600;
            font-size: 15px;
            margin: 8px 0 4px;
            color: #0f172a;
        }
        .topic-raw {
            font-size: 13px;
            color: #475569;
            margin-bottom: 10px;
            background: #f8fafc;
            padding: 6px 10px;
            border-radius: 12px;
        }
        .platform-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin: 4px 4px 4px 0;
        }
        .tag-ig { background: #fce4ec; color: #c62828; }
        .tag-yt { background: #ffebee; color: #b71c1c; }
        .tag-li { background: #e3f2fd; color: #0d47a1; }
        .tag-all { background: #e8f5e9; color: #1b5e20; }

        .audience-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin: 4px 4px 4px 0;
        }
        .aud-client { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
        .aud-student { background: #eef2ff; color: #4338ca; border: 1px solid #c7d2fe; }

        .hook-text {
            font-size: 13px;
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 14px;
            margin: 6px 0;
            color: #1e293b;
            border-left: 3px solid #2563eb;
        }
        .desc-text {
            font-size: 13px;
            color: #334155;
            margin: 6px 0;
            word-break: break-word;
        }
        .cta-text {
            font-size: 12px;
            font-weight: 600;
            color: #059669;
            margin: 6px 0;
            background: #ecfdf5;
            padding: 6px 10px;
            border-radius: 12px;
            display: inline-block;
        }
        .hashtags {
            font-size: 12px;
            color: #2563eb;
            font-weight: 500;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white;
            border-radius: 32px;
            padding: 32px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: fadeUp 0.25s ease;
            box-shadow: 0 30px 80px rgba(0,0,0,0.15);
        }
        .modal h2 { margin-bottom: 20px; font-size: 22px; }
        .modal label { font-weight: 500; font-size: 14px; display: block; margin: 12px 0 4px; }
        .modal input, .modal textarea, .modal select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: 0.2s;
        }
        .modal input:focus, .modal textarea:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .modal textarea { min-height: 60px; resize: vertical; }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }

        .flex { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .gap-1 { gap: 4px; }
        .text-muted { color: #64748b; font-size: 13px; }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(16px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 860px) {
            .month-view { grid-template-columns: repeat(3, 1fr); }
            .week-view { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 540px) {
            .app { padding: 16px; }
            .month-view { grid-template-columns: 1fr; }
            .week-view { grid-template-columns: 1fr; }
            .header h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="app" id="app">
    <div class="header">
        <h1><i class="fas fa-calendar-alt"></i> Content Planner</h1>
        <div class="controls">
            <div class="view-toggle">
                <button class="btn active" data-view="month"><i class="fas fa-calendar-week"></i> Month</button>
                <button class="btn" data-view="week"><i class="fas fa-calendar-day"></i> Week</button>
                <button class="btn" data-view="day"><i class="fas fa-list-ul"></i> Day</button>
            </div>
            <div class="nav-controls">
                <button class="btn btn-outline" id="navPrev"><i class="fas fa-chevron-left"></i></button>
                <span class="nav-label" id="navLabel">Day 1-31</span>
                <button class="btn btn-outline" id="navNext"><i class="fas fa-chevron-right"></i></button>
            </div>
            <button class="btn btn-refresh" id="refreshData"><i class="fas fa-sync-alt"></i></button>
            <button class="btn btn-primary" id="openAddModal"><i class="fas fa-plus"></i> Add</button>
            <button class="btn btn-outline" id="exportData"><i class="fas fa-download"></i> Export</button>
            <button class="btn btn-outline" id="importData"><i class="fas fa-upload"></i> Import</button>
            <input type="file" id="fileInput" accept=".json" style="display:none">
        </div>
    </div>

    <div class="calendar-grid month-view" id="calendarGrid"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2 id="modalTitle">Add Content</h2>
        <input type="hidden" id="editId" />
        <label>Day (1-31)</label>
        <input type="number" id="formDay" min="1" max="31" value="1" />
        <label>Raw Idea</label>
        <input type="text" id="formRaw" placeholder="e.g. Why I stopped paying for hosting" />
        <label>Refined Title</label>
        <input type="text" id="formRefined" placeholder="e.g. I Saved ₹36,000/Year by Ditching Hosting" />
        <label>Audience (client or student)</label>
        <input type="text" id="formAudience" placeholder="client / student" />
        <label>Platforms (comma separated: ig, yt, li, all)</label>
        <input type="text" id="formPlatforms" value="ig, yt, li" />
        <label>Hook (for all platforms)</label>
        <textarea id="formHook" rows="2" placeholder="Short hook that grabs attention..."></textarea>
        <label>Description / Body</label>
        <textarea id="formDesc" rows="3" placeholder="Full description or post body..."></textarea>
        <label>Call To Action</label>
        <input type="text" id="formCta" placeholder="e.g. DM 'WHATSAPP' for a free quote" />
        <label>Hashtags</label>
        <input type="text" id="formHashtags" placeholder="#content #marketing #growth" />
        <div class="modal-actions">
            <button class="btn btn-outline" id="closeModal">Cancel</button>
            <button class="btn btn-primary" id="saveContent">Save</button>
        </div>
    </div>
</div>

<script>
    // ================================================================
    // DATA LAYER - NEON DATABASE INTEGRATION
    // ================================================================
    let contentData = [];
    const API_BASE = '/api';

    // Fetch data from Neon database
    async function fetchFromDatabase() {
        try {
            const response = await fetch(`${API_BASE}/content`);
            if (!response.ok) throw new Error('Failed to fetch from database');
            const data = await response.json();
            return data.items || [];
        } catch (err) {
            console.error('Database fetch error:', err);
            return null;
        }
    }

    // Save data to Neon database
    async function saveToDatabase(items) {
        try {
            const response = await fetch(`${API_BASE}/content?bulk=1`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items }),
            });
            if (!response.ok) throw new Error('Failed to save to database');
            return true;
        } catch (err) {
            console.error('Database save error:', err);
            return false;
        }
    }

    // Initialize data from database or fallback to localStorage
    async function loadData() {
        // First, trigger auto-migration if needed and wait for it to complete
        try {
            const migrationResponse = await fetch(`${API_BASE}/init-db`, { method: 'POST' });
            if (!migrationResponse.ok) {
                console.warn('Migration endpoint returned non-OK status');
            }
            const migrationResult = await migrationResponse.json();
            console.log('Migration result:', migrationResult);
        } catch (err) {
            console.warn('Auto-migration trigger failed:', err);
        }
        
        // Wait for migration to fully complete (Neon cold start + SQL execution)
        await new Promise(resolve => setTimeout(resolve, 500));
        
        // Try to fetch from database first
        const dbData = await fetchFromDatabase();
        console.log('Database fetch result:', dbData);
        
        if (dbData !== null && dbData.length > 0) {
            // Use database data
            contentData = dbData;
            persistOnly();
            console.log(`Loaded ${contentData.length} items from database`);
        } else {
            // Fallback to localStorage for backward compatibility
            const stored = localStorage.getItem('contentPlannerData');
            if (stored) {
                try {
                    contentData = JSON.parse(stored);
                    if (!contentData || contentData.length === 0) {
                        contentData = [];
                        persistOnly();
                    }
                } catch(e) {
                    contentData = [];
                    persistOnly();
                }
            } else {
                contentData = [];
                persistOnly();
            }
            console.log(`Loaded ${contentData.length} items from localStorage fallback`);
        }
    }

    // Writes to localStorage WITHOUT triggering a render (used during initial load,
    // before the calendar grid exists in some call orders).
    function persistOnly() {
        localStorage.setItem('contentPlannerData', JSON.stringify(contentData));
    }

    async function saveData() {
        persistOnly();
        // Also save to database
        await saveToDatabase(contentData);
        renderCalendar();
    }

    function getDayData(day) {
        return contentData.filter(item => item.day === day);
    }

    async function addContent(item) {
        contentData.push(item);
        await saveData();
    }

    async function updateContent(id, updated) {
        const index = contentData.findIndex(item => item.id === id);
        if (index !== -1) {
            contentData[index] = { ...contentData[index], ...updated };
            await saveData();
        }
    }

    async function deleteContent(id) {
        contentData = contentData.filter(item => item.id !== id);
        await saveData();
    }

    function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

    // ================================================================
    // RENDER CALENDAR
    // ================================================================
    let currentView = 'month';
    let weekOffset = 0;
    let dayOffset = 0;

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.className = `calendar-grid ${currentView}-view`;
        grid.innerHTML = '';

        let daysToShow = [];
        const label = document.getElementById('navLabel');

        if (currentView === 'month') {
            for (let d = 1; d <= 31; d++) daysToShow.push(d);
            label.textContent = 'Day 1-31';
        } else if (currentView === 'week') {
            const today = new Date().getDate();
            const start = Math.max(1, Math.min(25, today + weekOffset * 7));
            const end = Math.min(31, start + 6);
            for (let d = start; d <= end; d++) daysToShow.push(d);
            label.textContent = `Day ${start}-${end}`;
        } else {
            const today = new Date().getDate();
            let day = Math.max(1, Math.min(31, today + dayOffset));
            daysToShow = [day];
            label.textContent = `Day ${day}`;
        }

        daysToShow.forEach(day => {
            const items = getDayData(day);
            const card = document.createElement('div');
            card.className = 'day-card';

            const dayHeader = document.createElement('div');
            dayHeader.className = 'day-number';
            dayHeader.innerHTML = `<span>Day ${day}</span> <small>${items.length} items</small>`;
            card.appendChild(dayHeader);

            if (items.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'text-muted';
                empty.style.padding = '8px 0';
                empty.textContent = 'No content planned';
                card.appendChild(empty);
            } else {
                items.forEach(item => {
                    const wrapper = document.createElement('div');
                    wrapper.style.marginBottom = '12px';
                    wrapper.style.borderBottom = '1px solid #f1f5f9';
                    wrapper.style.paddingBottom = '10px';

                    const raw = document.createElement('div');
                    raw.className = 'topic-raw';
                    raw.textContent = `📌 ${item.raw}`;
                    wrapper.appendChild(raw);

                    const refined = document.createElement('div');
                    refined.className = 'topic-title';
                    refined.textContent = item.refined || item.raw;
                    wrapper.appendChild(refined);

                    const tagRow = document.createElement('div');
                    tagRow.className = 'flex gap-1';

                    if (item.audience) {
                        const audTag = document.createElement('span');
                        audTag.className = `audience-tag aud-${item.audience}`;
                        audTag.textContent = item.audience;
                        tagRow.appendChild(audTag);
                    }

                    (item.platforms || ['all']).forEach(p => {
                        const tag = document.createElement('span');
                        tag.className = `platform-tag tag-${p}`;
                        tag.textContent = p.toUpperCase();
                        tagRow.appendChild(tag);
                    });
                    wrapper.appendChild(tagRow);

                    if (item.hook) {
                        const hook = document.createElement('div');
                        hook.className = 'hook-text';
                        hook.innerHTML = `<i class="fas fa-bolt" style="color:#2563eb;margin-right:6px;"></i> ${item.hook}`;
                        wrapper.appendChild(hook);
                    }

                    if (item.description) {
                        const desc = document.createElement('div');
                        desc.className = 'desc-text';
                        desc.textContent = item.description;
                        wrapper.appendChild(desc);
                    }

                    if (item.cta) {
                        const cta = document.createElement('div');
                        cta.className = 'cta-text';
                        cta.innerHTML = `<i class="fas fa-arrow-right" style="margin-right:6px;"></i> ${item.cta}`;
                        wrapper.appendChild(cta);
                    }

                    if (item.hashtags) {
                        const hash = document.createElement('div');
                        hash.className = 'hashtags';
                        hash.textContent = item.hashtags;
                        wrapper.appendChild(hash);
                    }

                    const actions = document.createElement('div');
                    actions.className = 'flex';
                    actions.style.marginTop = '8px';
                    const editBtn = document.createElement('button');
                    editBtn.className = 'btn btn-sm btn-outline';
                    editBtn.innerHTML = '<i class="fas fa-edit"></i>';
                    editBtn.onclick = () => openEditModal(item.id);
                    const delBtn = document.createElement('button');
                    delBtn.className = 'btn btn-sm btn-danger';
                    delBtn.innerHTML = '<i class="fas fa-trash"></i>';
                    delBtn.onclick = () => { if(confirm('Delete this?')) deleteContent(item.id); };
                    actions.appendChild(editBtn);
                    actions.appendChild(delBtn);
                    wrapper.appendChild(actions);
                    card.appendChild(wrapper);
                });
            }

            const addBtn = document.createElement('button');
            addBtn.className = 'btn btn-sm btn-outline';
            addBtn.style.marginTop = '4px';
            addBtn.innerHTML = '<i class="fas fa-plus"></i> Add to this day';
            addBtn.onclick = () => openAddModal(day);
            card.appendChild(addBtn);
            grid.appendChild(card);
        });
    }

    // ================================================================
    // MODAL LOGIC
    // ================================================================
    let isEditing = false;
    let editId = null;

    function openAddModal(day = null) {
        isEditing = false;
        editId = null;
        document.getElementById('modalTitle').textContent = 'Add Content';
        document.getElementById('editId').value = '';
        document.getElementById('formDay').value = day || new Date().getDate();
        document.getElementById('formRaw').value = '';
        document.getElementById('formRefined').value = '';
        document.getElementById('formAudience').value = '';
        document.getElementById('formPlatforms').value = 'ig, yt, li';
        document.getElementById('formHook').value = '';
        document.getElementById('formDesc').value = '';
        document.getElementById('formCta').value = '';
        document.getElementById('formHashtags').value = '';
        document.getElementById('modalOverlay').classList.add('show');
    }

    function openEditModal(id) {
        const item = contentData.find(d => d.id === id);
        if (!item) return;
        isEditing = true;
        editId = id;
        document.getElementById('modalTitle').textContent = 'Edit Content';
        document.getElementById('editId').value = id;
        document.getElementById('formDay').value = item.day;
        document.getElementById('formRaw').value = item.raw || '';
        document.getElementById('formRefined').value = item.refined || '';
        document.getElementById('formAudience').value = item.audience || '';
        document.getElementById('formPlatforms').value = (item.platforms || []).join(', ');
        document.getElementById('formHook').value = item.hook || '';
        document.getElementById('formDesc').value = item.description || '';
        document.getElementById('formCta').value = item.cta || '';
        document.getElementById('formHashtags').value = item.hashtags || '';
        document.getElementById('modalOverlay').classList.add('show');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('show');
    }

    async function saveFromModal() {
        const day = parseInt(document.getElementById('formDay').value) || 1;
        const raw = document.getElementById('formRaw').value.trim();
        const refined = document.getElementById('formRefined').value.trim();
        const audience = document.getElementById('formAudience').value.trim().toLowerCase();
        const platforms = document.getElementById('formPlatforms').value.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
        const hook = document.getElementById('formHook').value.trim();
        const description = document.getElementById('formDesc').value.trim();
        const cta = document.getElementById('formCta').value.trim();
        const hashtags = document.getElementById('formHashtags').value.trim();

        if (!raw) { alert('Raw idea is required'); return; }

        const data = { day, raw, refined, audience, platforms, hook, description, cta, hashtags };

        if (isEditing && editId) {
            updateContent(editId, data);
        } else {
            data.id = genId();
            addContent(data);
        }
        closeModal();
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    function navPrev() {
        if (currentView === 'week') weekOffset--;
        else if (currentView === 'day') dayOffset--;
        renderCalendar();
    }

    function navNext() {
        if (currentView === 'week') weekOffset++;
        else if (currentView === 'day') dayOffset++;
        renderCalendar();
    }

    // ================================================================
    // IMPORT / EXPORT / REFRESH
    // ================================================================
    function exportData() {
        const blob = new Blob([JSON.stringify(contentData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `content-planner-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    async function importData(file) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    contentData = imported;
                    await saveData();
                    alert('Import successful!');
                } else {
                    alert('Invalid JSON format. Expected an array.');
                }
            } catch(err) {
                alert('Error parsing JSON: ' + err.message);
            }
        };
        reader.readAsText(file);
    }

    async function refreshData() {
        await loadData();
        weekOffset = 0;
        dayOffset = 0;
        renderCalendar();
    }

    // ================================================================
    // VIEW TOGGLE
    // ================================================================
    function setView(view) {
        currentView = view;
        weekOffset = 0;
        dayOffset = 0;
        document.querySelectorAll('.view-toggle .btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.view-toggle .btn[data-view="${view}"]`).classList.add('active');
        renderCalendar();
    }

    // ================================================================
    // INIT
    // ================================================================
    document.addEventListener('DOMContentLoaded', async function() {
        await loadData();
        renderCalendar();

        document.querySelectorAll('.view-toggle .btn').forEach(btn => {
            btn.addEventListener('click', () => setView(btn.dataset.view));
        });

        document.getElementById('navPrev').addEventListener('click', navPrev);
        document.getElementById('navNext').addEventListener('click', navNext);

        document.getElementById('refreshData').addEventListener('click', refreshData);
        document.getElementById('openAddModal').addEventListener('click', () => openAddModal());
        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('saveContent').addEventListener('click', saveFromModal);
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        document.getElementById('exportData').addEventListener('click', exportData);
        document.getElementById('importData').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });
        document.getElementById('fileInput').addEventListener('change', (e) => {
            if (e.target.files.length) {
                importData(e.target.files[0]);
                e.target.value = '';
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    });
</script>
</body>
</html>
