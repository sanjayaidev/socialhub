<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Planner · Monthly Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6fa;
            color: #1e1e2f;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .app {
            max-width: 1440px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 28px 32px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.4);
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            gap: 16px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 600;
            background: linear-gradient(145deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 i { font-size: 28px; background: none; -webkit-text-fill-color: #2563eb; }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 60px;
            font-weight: 500;
            font-size: 14px;
            background: white;
            color: #1e1e2f;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: #2563eb; color: white; border: none; box-shadow: 0 4px 12px rgba(37,99,235,0.25); }
        .btn-primary:hover { background: #1d4ed8; transform: scale(0.97); }
        .btn-outline { background: transparent; border: 1px solid #cbd5e1; }
        .btn-outline:hover { background: #f1f5f9; }
        .btn-danger { background: #dc2626; color: white; border: none; }
        .btn-sm { padding: 4px 14px; font-size: 12px; }
        .btn-refresh { background: #8b5cf6; color: white; border: none; }
        .btn-refresh:hover { background: #7c3aed; }

        .view-toggle {
            display: flex;
            gap: 4px;
            background: #f1f5f9;
            border-radius: 60px;
            padding: 4px;
        }
        .view-toggle .btn {
            border-radius: 40px;
            border: none;
            background: transparent;
            padding: 6px 16px;
            font-weight: 500;
            font-size: 13px;
        }
        .view-toggle .btn.active {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .nav-controls {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .nav-controls .btn {
            padding: 6px 12px;
            font-size: 13px;
        }
        .nav-label {
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            min-width: 130px;
            text-align: center;
        }

        .month-year-picker {
            display: flex;
            align-items: center;
            gap: 2px;
            background: #f1f5f9;
            border-radius: 60px;
            padding: 4px 6px;
        }
        .month-year-picker button {
            background: transparent;
            border: none;
            cursor: pointer;
            color: #475569;
            padding: 4px 8px;
            font-size: 13px;
            border-radius: 30px;
        }
        .month-year-picker button:hover { background: white; }
        .month-year-picker select {
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 13px;
            padding: 4px 4px;
            cursor: pointer;
        }
        .month-year-picker .year-label {
            font-weight: 600;
            font-size: 13px;
            min-width: 38px;
            text-align: center;
            color: #1e293b;
        }

        .calendar-grid { margin-top: 12px; }
        .month-view { display: block; }
        .week-view { display: grid; grid-template-columns: repeat(7, 1fr); gap: 14px; }
        .day-view { display: grid; grid-template-columns: 1fr; gap: 14px; }

        .weekday-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 8px;
        }
        .weekday-header span {
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
        }
        .month-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }
        .cal-cell {
            background: white;
            border-radius: 16px;
            border: 1px solid #eef2f6;
            padding: 8px 10px;
            min-height: 100px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }
        .cal-cell:hover { border-color: #cbd5e1; box-shadow: 0 6px 18px rgba(0,0,0,0.05); transform: translateY(-2px); }
        .cal-cell.outside { opacity: 0.35; }
        .cal-cell.outside:hover { transform: none; box-shadow: none; border-color: #eef2f6; }
        .cal-cell.today { border: 2px solid #2563eb; }
        .cal-cell.selected { background: #eff6ff; border-color: #2563eb; }
        .cal-date {
            font-weight: 600;
            font-size: 13px;
            color: #1e293b;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .count-badge {
            background: #e2e8f0;
            color: #475569;
            font-size: 10px;
            font-weight: 700;
            border-radius: 20px;
            padding: 1px 7px;
        }
        .cal-item-chip {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 8px;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .cal-item-chip .dot { width: 6px; height: 6px; border-radius: 50%; flex: 0 0 6px; }
        .cal-more { font-size: 10px; color: #94a3b8; margin-top: 2px; }

        .day-detail-panel {
            margin-top: 22px;
            border-top: 1px solid #eef2f6;
            padding-top: 18px;
        }
        .day-detail-header {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .day-detail-empty {
            color: #94a3b8;
            font-size: 13px;
            text-align: center;
            padding: 20px 0;
        }
        .day-detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }
        @media (max-width: 760px) { .day-detail-grid { grid-template-columns: 1fr; } }

        .day-card {
            background: white;
            border-radius: 20px;
            padding: 16px 14px;
            border: 1px solid #eef2f6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.25s ease;
            animation: fadeUp 0.3s ease forwards;
        }
        .day-card:hover { border-color: #cbd5e1; box-shadow: 0 8px 24px rgba(0,0,0,0.04); transform: translateY(-3px); }
        .day-number {
            font-weight: 600;
            font-size: 18px;
            color: #1e293b;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .day-number small { font-weight: 400; font-size: 13px; color: #64748b; }
        .topic-title {
            font-weight: 600;
            font-size: 15px;
            margin: 8px 0 4px;
            color: #0f172a;
        }
        .topic-raw {
            font-size: 13px;
            color: #475569;
            margin-bottom: 10px;
            background: #f8fafc;
            padding: 6px 10px;
            border-radius: 12px;
        }
        .platform-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin: 4px 4px 4px 0;
        }
        .tag-ig { background: #fce4ec; color: #c62828; }
        .tag-yt { background: #ffebee; color: #b71c1c; }
        .tag-li { background: #e3f2fd; color: #0d47a1; }
        .tag-all { background: #e8f5e9; color: #1b5e20; }

        .audience-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin: 4px 4px 4px 0;
        }
        .aud-client { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
        .aud-student { background: #eef2ff; color: #4338ca; border: 1px solid #c7d2fe; }

        .hook-text {
            font-size: 13px;
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 14px;
            margin: 6px 0;
            color: #1e293b;
            border-left: 3px solid #2563eb;
        }
        .desc-text {
            font-size: 13px;
            color: #334155;
            margin: 6px 0;
            word-break: break-word;
        }
        .cta-text {
            font-size: 12px;
            font-weight: 600;
            color: #059669;
            margin: 6px 0;
            background: #ecfdf5;
            padding: 6px 10px;
            border-radius: 12px;
            display: inline-block;
        }
        .hashtags {
            font-size: 12px;
            color: #2563eb;
            font-weight: 500;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white;
            border-radius: 32px;
            padding: 32px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: fadeUp 0.25s ease;
            box-shadow: 0 30px 80px rgba(0,0,0,0.15);
        }
        .modal h2 { margin-bottom: 20px; font-size: 22px; }
        .modal label { font-weight: 500; font-size: 14px; display: block; margin: 12px 0 4px; }
        .modal input, .modal textarea, .modal select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: 0.2s;
        }
        .modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .modal textarea { min-height: 60px; resize: vertical; }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
        .modal-row { display: flex; gap: 10px; }
        .modal-row > div { flex: 1; }

        .flex { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .gap-1 { gap: 4px; }
        .text-muted { color: #64748b; font-size: 13px; }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(16px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 860px) {
            .month-grid { grid-template-columns: repeat(7, 1fr); }
            .week-view { grid-template-columns: repeat(3, 1fr); }
            .cal-cell { min-height: 70px; }
        }
        @media (max-width: 540px) {
            .app { padding: 16px; }
            .week-view { grid-template-columns: 1fr; }
            .header h1 { font-size: 20px; }
            .cal-item-chip { display: none; }
        }
    </style>
</head>
<body>

<div class="app" id="app">
    <div class="header">
        <h1><i class="fas fa-calendar-alt"></i> Content Planner</h1>
        <div class="controls">
            <a href="sidepanel.html" class="btn btn-outline"><i class="fas fa-plus-circle"></i> Sidepanel</a>
            <a href="studio.html?tab=designer" class="btn btn-outline"><i class="fas fa-palette"></i> Designer</a>
            <a href="studio.html?tab=dashboard" class="btn btn-outline"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="ai-designs.html" class="btn btn-outline"><i class="fas fa-images"></i> AI Gallery</a>
            <div class="view-toggle">
                <button class="btn active" data-view="month"><i class="fas fa-calendar-week"></i> Month</button>
                <button class="btn" data-view="week"><i class="fas fa-calendar-day"></i> Week</button>
                <button class="btn" data-view="day"><i class="fas fa-list-ul"></i> Day</button>
            </div>
            <div class="month-year-picker">
                <button id="yearPrev" title="Previous year"><i class="fas fa-angles-left"></i></button>
                <span class="year-label" id="yearLabel">2026</span>
                <button id="yearNext" title="Next year"><i class="fas fa-angles-right"></i></button>
                <select id="monthSelect"></select>
            </div>
            <div class="nav-controls">
                <button class="btn btn-outline" id="navPrev"><i class="fas fa-chevron-left"></i></button>
                <span class="nav-label" id="navLabel">Month</span>
                <button class="btn btn-outline" id="navNext"><i class="fas fa-chevron-right"></i></button>
            </div>
            <button class="btn btn-refresh" id="refreshData"><i class="fas fa-sync-alt"></i></button>
            <button class="btn btn-primary" id="openAddModal"><i class="fas fa-plus"></i> Add</button>
        </div>
    </div>

    <div class="calendar-grid month-view" id="calendarGrid"></div>
    <div class="day-detail-panel" id="dayDetailPanel"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2 id="modalTitle">Add Content</h2>
        <input type="hidden" id="editId" />
        <div class="modal-row">
            <div>
                <label>Month</label>
                <select id="formMonth"></select>
            </div>
            <div>
                <label>Day</label>
                <input type="number" id="formDay" min="1" max="31" value="1" />
            </div>
        </div>
        <label>Title</label>
        <input type="text" id="formRaw" placeholder="e.g. Why I stopped paying for hosting" />
        <label>Audience (client or student)</label>
        <input type="text" id="formAudience" placeholder="client / student" />
        <label>Platforms (comma separated: ig, yt, li)</label>
        <input type="text" id="formPlatforms" value="ig, yt, li" />
        <label>Hook</label>
        <textarea id="formHook" rows="2" placeholder="Short hook that grabs attention..."></textarea>
        <label>Caption / Body</label>
        <textarea id="formDesc" rows="3" placeholder="Full caption or post body..."></textarea>
        <label>Call To Action</label>
        <input type="text" id="formCta" placeholder="e.g. DM 'WHATSAPP' for a free quote" />
        <label>Hashtags (comma separated, no #)</label>
        <input type="text" id="formHashtags" placeholder="content, marketing, growth" />
        <div class="modal-actions">
            <button class="btn btn-outline" id="closeModal">Cancel</button>
            <button class="btn btn-primary" id="saveContent">Save</button>
        </div>
    </div>
</div>

<script>
    // ================================================================
    // DATE HELPERS
    // ================================================================
    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const WEEKDAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function daysInMonth(year, month) { return new Date(year, month, 0).getDate(); } // month is 1-12
    function firstWeekdayOfMonth(year, month) { return new Date(year, month - 1, 1).getDay(); }
    function addMonths(date, n) {
        const d = new Date(date);
        d.setDate(1);
        d.setMonth(d.getMonth() + n);
        return d;
    }
    function addDays(date, n) {
        const d = new Date(date);
        d.setDate(d.getDate() + n);
        return d;
    }
    function getWeekDates(date) {
        const d = new Date(date);
        d.setDate(d.getDate() - d.getDay());
        const week = [];
        for (let i = 0; i < 7; i++) { week.push(new Date(d)); d.setDate(d.getDate() + 1); }
        return week;
    }
    function fmtShort(d) { return `${MONTH_NAMES[d.getMonth()].slice(0,3)} ${d.getDate()}`; }
    function fmtRange(start, end) {
        if (start.getMonth() === end.getMonth()) return `${fmtShort(start)}–${end.getDate()}, ${start.getFullYear()}`;
        return `${fmtShort(start)} – ${fmtShort(end)}, ${end.getFullYear()}`;
    }

    // ================================================================
    // DATA LAYER — backed by calendar_days (synced from Dashboard's
    // "Sync to Calendar" button, or edited directly here).
    // contentData always holds items for whatever month/year is
    // currently loaded (tracked by loadedMonth/loadedYear), matching
    // cursorDate at the time loadData() was last called.
    // ================================================================
    let contentData = [];
    let loadedMonth = null;
    let loadedYear = null;

    async function apiCall(endpoint, method = 'POST', data = {}) {
        const response = await fetch(endpoint, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: method !== 'GET' ? JSON.stringify(data) : undefined
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
    }

    async function loadData() {
        const month = cursorDate.getMonth() + 1;
        const year = cursorDate.getFullYear();
        try {
            contentData = await apiCall('/api/content/calendar-month', 'POST', { month, year });
            loadedMonth = month;
            loadedYear = year;
        } catch (err) {
            console.error('Error loading calendar data:', err);
            contentData = [];
            loadedMonth = month;
            loadedYear = year;
        }
    }

    async function saveDay(month, day, data) {
        await apiCall('/api/content/calendar-day', 'POST', { month, year: cursorDate.getFullYear(), day, data });
        await loadData();
        renderCalendar();
    }

    async function deleteDay(month, day) {
        await apiCall('/api/content/calendar-day', 'DELETE', { month, year: cursorDate.getFullYear(), day });
        await loadData();
        renderCalendar();
    }

    function getDayData(month, day) {
        // contentData only ever holds the currently-loaded month/year.
        if (loadedMonth !== parseInt(month)) return [];
        return contentData.filter(item => parseInt(item.day) === parseInt(day));
    }

    async function addOrUpdateContent(month, day, fields) {
        const data = {
            title: fields.title || '',
            type: fields.type || 'single',
            hook: fields.hook || '',
            caption: fields.caption || '',
            hashtags: fields.hashtags || [],
            audience: fields.audience || '',
            platforms: fields.platforms || [],
            cta: fields.cta || '',
            image_prompt: fields.image_prompt || '',
            images: fields.images || []
        };
        await saveDay(month, day, data);
    }

    function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

    // ================================================================
    // STATE
    // ================================================================
    let currentView = 'month';
    let cursorDate = new Date(); // anchor date driving month/week/day views
    let selectedDetail = null;   // { month, day } currently expanded in month view

    // ================================================================
    // SHARED ITEM CARD BUILDER
    // ================================================================
    function buildItemCard(item) {
        const wrapper = document.createElement('div');
        wrapper.style.marginBottom = '12px';
        wrapper.style.borderBottom = '1px solid #f1f5f9';
        wrapper.style.paddingBottom = '10px';

        const titleEl = document.createElement('div');
        titleEl.className = 'topic-title';
        titleEl.textContent = item.title || '(untitled)';
        wrapper.appendChild(titleEl);

        const tagRow = document.createElement('div');
        tagRow.className = 'flex gap-1';
        if (item.audience) {
            const audTag = document.createElement('span');
            audTag.className = `audience-tag aud-${item.audience}`;
            audTag.textContent = item.audience;
            tagRow.appendChild(audTag);
        }
        if (item.type) {
            const typeTag = document.createElement('span');
            typeTag.className = 'platform-tag tag-all';
            typeTag.textContent = item.type;
            tagRow.appendChild(typeTag);
        }
        (item.platforms || []).forEach(p => {
            const tag = document.createElement('span');
            tag.className = `platform-tag tag-${p}`;
            tag.textContent = p.toUpperCase();
            tagRow.appendChild(tag);
        });
        wrapper.appendChild(tagRow);

        if (item.hook) {
            const hook = document.createElement('div');
            hook.className = 'hook-text';
            hook.innerHTML = `<i class="fas fa-bolt" style="color:#2563eb;margin-right:6px;"></i> ${item.hook}`;
            wrapper.appendChild(hook);
        }
        if (item.caption) {
            const desc = document.createElement('div');
            desc.className = 'desc-text';
            desc.textContent = item.caption;
            wrapper.appendChild(desc);
        }
        if (item.cta) {
            const cta = document.createElement('div');
            cta.className = 'cta-text';
            cta.innerHTML = `<i class="fas fa-arrow-right" style="margin-right:6px;"></i> ${item.cta}`;
            wrapper.appendChild(cta);
        }
        if (item.hashtags && item.hashtags.length) {
            const hash = document.createElement('div');
            hash.className = 'hashtags';
            hash.textContent = item.hashtags.map(h => '#' + h).join(' ');
            wrapper.appendChild(hash);
        }
        if (item.images && item.images.length) {
            const img = document.createElement('img');
            img.src = item.images[0];
            img.style.cssText = 'width:100%;border-radius:12px;margin-top:8px;max-height:160px;object-fit:cover;';
            wrapper.appendChild(img);
        }

        const actions = document.createElement('div');
        actions.className = 'flex';
        actions.style.marginTop = '8px';
        const editBtn = document.createElement('button');
        editBtn.className = 'btn btn-sm btn-outline';
        editBtn.innerHTML = '<i class="fas fa-edit"></i>';
        editBtn.onclick = () => openEditModal(item.month, item.day);
        const delBtn = document.createElement('button');
        delBtn.className = 'btn btn-sm btn-danger';
        delBtn.innerHTML = '<i class="fas fa-trash"></i>';
        delBtn.onclick = () => { if (confirm('Delete this?')) deleteDay(item.month, item.day); };
        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        wrapper.appendChild(actions);

        return wrapper;
    }

    function buildDayCard(month, day, dateObj) {
        const items = getDayData(month, day);
        const card = document.createElement('div');
        card.className = 'day-card';

        const dayHeader = document.createElement('div');
        dayHeader.className = 'day-number';
        const label = dateObj ? `${WEEKDAY_NAMES[dateObj.getDay()]}, ${MONTH_NAMES[month-1].slice(0,3)} ${day}` : `Day ${day}`;
        dayHeader.innerHTML = `<span>${label}</span> <small>${items.length} items</small>`;
        card.appendChild(dayHeader);

        if (items.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'text-muted';
            empty.style.padding = '8px 0';
            empty.textContent = 'No content planned';
            card.appendChild(empty);
        } else {
            items.forEach(item => card.appendChild(buildItemCard(item)));
        }

        const addBtn = document.createElement('button');
        addBtn.className = 'btn btn-sm btn-outline';
        addBtn.style.marginTop = '4px';
        addBtn.innerHTML = '<i class="fas fa-plus"></i> Add to this day';
        addBtn.onclick = () => openAddModal(month, day);
        card.appendChild(addBtn);

        return card;
    }

    // ================================================================
    // RENDER: MONTH VIEW (real calendar grid)
    // ================================================================
    function renderMonthGrid() {
        const grid = document.getElementById('calendarGrid');
        grid.className = 'calendar-grid month-view';

        const year = cursorDate.getFullYear();
        const month = cursorDate.getMonth() + 1;
        document.getElementById('navLabel').textContent = `${MONTH_NAMES[month-1]} ${year}`;

        const weekdayRow = document.createElement('div');
        weekdayRow.className = 'weekday-header';
        WEEKDAY_NAMES.forEach(w => {
            const s = document.createElement('span');
            s.textContent = w;
            weekdayRow.appendChild(s);
        });
        grid.appendChild(weekdayRow);

        const cellsWrap = document.createElement('div');
        cellsWrap.className = 'month-grid';

        const totalDays = daysInMonth(year, month);
        const startOffset = firstWeekdayOfMonth(year, month);
        const prevMonth = month === 1 ? 12 : month - 1;
        const prevYear = month === 1 ? year - 1 : year;
        const prevMonthDays = daysInMonth(prevYear, prevMonth);

        const today = new Date();
        const isRealCurrentMonth = today.getFullYear() === year && today.getMonth() + 1 === month;
        const totalCells = Math.ceil((startOffset + totalDays) / 7) * 7;

        for (let i = 0; i < totalCells; i++) {
            const cell = document.createElement('div');
            let dayNum, isOutside = false, outsideDir = 0;

            if (i < startOffset) {
                dayNum = prevMonthDays - startOffset + i + 1;
                isOutside = true;
                outsideDir = -1;
            } else if (i >= startOffset + totalDays) {
                dayNum = i - startOffset - totalDays + 1;
                isOutside = true;
                outsideDir = 1;
            } else {
                dayNum = i - startOffset + 1;
            }

            cell.className = 'cal-cell' + (isOutside ? ' outside' : '');
            if (!isOutside && isRealCurrentMonth && dayNum === today.getDate()) cell.classList.add('today');
            if (!isOutside && selectedDetail && selectedDetail.month === month && selectedDetail.day === dayNum) cell.classList.add('selected');

            const items = isOutside ? [] : getDayData(month, dayNum);

            const dateRow = document.createElement('div');
            dateRow.className = 'cal-date';
            dateRow.innerHTML = `<span>${dayNum}</span>` + (items.length ? `<span class="count-badge">${items.length}</span>` : '');
            cell.appendChild(dateRow);

            items.slice(0, 2).forEach(item => {
                const chip = document.createElement('div');
                chip.className = 'cal-item-chip';
                const color = item.audience === 'client' ? { bg: '#fff7ed', fg: '#c2410c', dot: '#f97316' }
                            : item.audience === 'student' ? { bg: '#eef2ff', fg: '#4338ca', dot: '#6366f1' }
                            : { bg: '#f1f5f9', fg: '#475569', dot: '#94a3b8' };
                chip.style.background = color.bg;
                chip.style.color = color.fg;
                chip.innerHTML = `<span class="dot" style="background:${color.dot}"></span>${(item.title || '').slice(0, 22)}`;
                cell.appendChild(chip);
            });
            if (items.length > 2) {
                const more = document.createElement('div');
                more.className = 'cal-more';
                more.textContent = `+${items.length - 2} more`;
                cell.appendChild(more);
            }

            if (isOutside) {
                cell.onclick = () => { cursorDate = addMonths(cursorDate, outsideDir); selectedDetail = null; loadData().then(renderCalendar); };
            } else {
                cell.onclick = () => { selectedDetail = { month, day: dayNum }; renderCalendar(); };
            }

            cellsWrap.appendChild(cell);
        }

        grid.appendChild(cellsWrap);
        renderDayDetailPanel(month);
    }

    function renderDayDetailPanel(month) {
        const panel = document.getElementById('dayDetailPanel');
        panel.innerHTML = '';
        if (currentView !== 'month') return;

        if (!selectedDetail) {
            const empty = document.createElement('div');
            empty.className = 'day-detail-empty';
            empty.textContent = 'Click a day on the calendar to see or add content for it.';
            panel.appendChild(empty);
            return;
        }

        const { month: dMonth, day: dDay } = selectedDetail;
        const items = getDayData(dMonth, dDay);

        const header = document.createElement('div');
        header.className = 'day-detail-header';
        header.innerHTML = `<span>${MONTH_NAMES[dMonth-1]} ${dDay} — ${items.length} item${items.length === 1 ? '' : 's'}</span>`;
        const addBtn = document.createElement('button');
        addBtn.className = 'btn btn-sm btn-primary';
        addBtn.innerHTML = '<i class="fas fa-plus"></i> Add to this day';
        addBtn.onclick = () => openAddModal(dMonth, dDay);
        header.appendChild(addBtn);
        panel.appendChild(header);

        if (items.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'day-detail-empty';
            empty.textContent = 'No content planned for this day yet.';
            panel.appendChild(empty);
        } else {
            const itemsGrid = document.createElement('div');
            itemsGrid.className = 'day-detail-grid';
            items.forEach(item => itemsGrid.appendChild(buildItemCard(item)));
            panel.appendChild(itemsGrid);
        }
    }

    // ================================================================
    // RENDER: WEEK / DAY VIEWS
    // ================================================================
    function renderWeekView() {
        const grid = document.getElementById('calendarGrid');
        grid.className = 'calendar-grid week-view';
        const week = getWeekDates(cursorDate);
        document.getElementById('navLabel').textContent = fmtRange(week[0], week[6]);
        week.forEach(d => grid.appendChild(buildDayCard(d.getMonth() + 1, d.getDate(), d)));
    }

    function renderDayView() {
        const grid = document.getElementById('calendarGrid');
        grid.className = 'calendar-grid day-view';
        document.getElementById('navLabel').textContent = `${WEEKDAY_NAMES[cursorDate.getDay()]}, ${fmtShort(cursorDate)}, ${cursorDate.getFullYear()}`;
        grid.appendChild(buildDayCard(cursorDate.getMonth() + 1, cursorDate.getDate(), cursorDate));
    }

    // ================================================================
    // RENDER DISPATCH
    // ================================================================
    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const panel = document.getElementById('dayDetailPanel');
        if (currentView !== 'month') panel.innerHTML = '';
        syncPickerUI();

        if (currentView === 'month') renderMonthGrid();
        else if (currentView === 'week') renderWeekView();
        else renderDayView();
    }

    // ================================================================
    // MONTH / YEAR PICKER
    // ================================================================
    function populateMonthSelect() {
        const sel = document.getElementById('monthSelect');
        sel.innerHTML = MONTH_NAMES.map((m, i) => `<option value="${i+1}">${m}</option>`).join('');
    }
    function syncPickerUI() {
        document.getElementById('monthSelect').value = cursorDate.getMonth() + 1;
        document.getElementById('yearLabel').textContent = cursorDate.getFullYear();
    }

    // ================================================================
    // MODAL LOGIC
    // ================================================================
    let isEditing = false;

    function populateFormMonth() {
        const sel = document.getElementById('formMonth');
        sel.innerHTML = MONTH_NAMES.map((m, i) => `<option value="${i+1}">${m}</option>`).join('');
    }

    function syncDayMaxToMonth() {
        const monthVal = parseInt(document.getElementById('formMonth').value) || 1;
        const max = daysInMonth(cursorDate.getFullYear(), monthVal);
        const dayInput = document.getElementById('formDay');
        dayInput.max = max;
        if (parseInt(dayInput.value) > max) dayInput.value = max;
    }

    function openAddModal(month = null, day = null) {
        isEditing = false;
        document.getElementById('modalTitle').textContent = 'Add Content';
        document.getElementById('editId').value = '';
        document.getElementById('formMonth').value = month || (cursorDate.getMonth() + 1);
        document.getElementById('formDay').value = day || cursorDate.getDate();
        syncDayMaxToMonth();
        document.getElementById('formRaw').value = '';
        document.getElementById('formAudience').value = '';
        document.getElementById('formPlatforms').value = 'ig, yt, li';
        document.getElementById('formHook').value = '';
        document.getElementById('formDesc').value = '';
        document.getElementById('formCta').value = '';
        document.getElementById('formHashtags').value = '';
        document.getElementById('modalOverlay').classList.add('show');
    }

    function openEditModal(month, day) {
        const item = getDayData(month, day)[0];
        if (!item) return;
        isEditing = true;
        document.getElementById('modalTitle').textContent = 'Edit Content';
        document.getElementById('editId').value = `${month}-${day}`;
        document.getElementById('formMonth').value = month;
        document.getElementById('formDay').value = day;
        syncDayMaxToMonth();
        document.getElementById('formRaw').value = item.title || '';
        document.getElementById('formAudience').value = item.audience || '';
        document.getElementById('formPlatforms').value = (item.platforms || []).join(', ');
        document.getElementById('formHook').value = item.hook || '';
        document.getElementById('formDesc').value = item.caption || '';
        document.getElementById('formCta').value = item.cta || '';
        document.getElementById('formHashtags').value = (item.hashtags || []).join(', ');
        document.getElementById('modalOverlay').classList.add('show');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('show');
    }

    async function saveFromModal() {
        const month = parseInt(document.getElementById('formMonth').value) || 1;
        const day = parseInt(document.getElementById('formDay').value) || 1;
        const title = document.getElementById('formRaw').value.trim();
        const audience = document.getElementById('formAudience').value.trim().toLowerCase();
        const platforms = document.getElementById('formPlatforms').value.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
        const hook = document.getElementById('formHook').value.trim();
        const caption = document.getElementById('formDesc').value.trim();
        const cta = document.getElementById('formCta').value.trim();
        const hashtags = document.getElementById('formHashtags').value.split(',').map(s => s.trim().replace(/^#/, '')).filter(Boolean);

        if (!title) { alert('Title is required'); return; }

        try {
            await addOrUpdateContent(month, day, { title, audience, platforms, hook, caption, cta, hashtags, type: 'single' });
            closeModal();
        } catch (err) {
            alert('Save failed: ' + err.message);
        }
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    function navPrev() {
        if (currentView === 'month') cursorDate = addMonths(cursorDate, -1);
        else if (currentView === 'week') cursorDate = addDays(cursorDate, -7);
        else cursorDate = addDays(cursorDate, -1);
        selectedDetail = null;
        loadData().then(renderCalendar);
    }
    function navNext() {
        if (currentView === 'month') cursorDate = addMonths(cursorDate, 1);
        else if (currentView === 'week') cursorDate = addDays(cursorDate, 7);
        else cursorDate = addDays(cursorDate, 1);
        selectedDetail = null;
        loadData().then(renderCalendar);
    }

    // ================================================================
    // REFRESH
    // ================================================================
    function refreshData() {
        loadData().then(renderCalendar);
    }

    // ================================================================
    // VIEW TOGGLE
    // ================================================================
    function setView(view) {
        currentView = view;
        selectedDetail = null;
        document.querySelectorAll('.view-toggle .btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.view-toggle .btn[data-view="${view}"]`).classList.add('active');
        renderCalendar();
    }

    // ================================================================
    // INIT
    // ================================================================
    document.addEventListener('DOMContentLoaded', function() {
        populateMonthSelect();
        populateFormMonth();
        loadData().then(renderCalendar);

        document.querySelectorAll('.view-toggle .btn').forEach(btn => {
            btn.addEventListener('click', () => setView(btn.dataset.view));
        });

        document.getElementById('navPrev').addEventListener('click', navPrev);
        document.getElementById('navNext').addEventListener('click', navNext);

        document.getElementById('monthSelect').addEventListener('change', (e) => {
            cursorDate = new Date(cursorDate.getFullYear(), parseInt(e.target.value) - 1, 1);
            selectedDetail = null;
            loadData().then(renderCalendar);
        });
        document.getElementById('yearPrev').addEventListener('click', () => {
            cursorDate = addMonths(cursorDate, -12);
            selectedDetail = null;
            loadData().then(renderCalendar);
        });
        document.getElementById('yearNext').addEventListener('click', () => {
            cursorDate = addMonths(cursorDate, 12);
            selectedDetail = null;
            loadData().then(renderCalendar);
        });

        document.getElementById('formMonth').addEventListener('change', syncDayMaxToMonth);

        document.getElementById('refreshData').addEventListener('click', refreshData);
        document.getElementById('openAddModal').addEventListener('click', () => openAddModal());
        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('saveContent').addEventListener('click', saveFromModal);
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    });
</script>
</body>
</html>
