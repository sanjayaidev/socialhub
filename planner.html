<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Planner · 31 Day Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Playfair+Display:wght@600;700&family=Oswald:wght@400;600&family=Montserrat:wght@500;700;800&family=Raleway:wght@500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6fa;
            color: #1e1e2f;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .app {
            max-width: 1440px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 28px 32px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.4);
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            gap: 16px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 600;
            background: linear-gradient(145deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 i {
            font-size: 28px;
            background: none;
            -webkit-text-fill-color: #2563eb;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 60px;
            font-weight: 500;
            font-size: 14px;
            background: white;
            color: #1e1e2f;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .btn-primary {
            background: #2563eb;
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(37,99,235,0.25);
        }
        .btn-primary:hover {
            background: #1d4ed8;
            transform: scale(0.97);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
        }
        .btn-outline:hover {
            background: #f1f5f9;
        }
        .btn-danger {
            background: #dc2626;
            color: white;
            border: none;
        }
        .btn-sm {
            padding: 4px 14px;
            font-size: 12px;
        }
        .btn-refresh {
            background: #8b5cf6;
            color: white;
            border: none;
        }
        .btn-refresh:hover {
            background: #7c3aed;
        }
        .btn-ai {
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: white;
            border: none;
        }
        .btn-ai:hover {
            opacity: 0.92;
            transform: scale(0.97);
        }
        .btn-design {
            background: #0f172a;
            color: white;
            border: none;
        }
        .btn-design:hover {
            background: #1e293b;
        }
        .btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none !important;
        }

        .view-toggle {
            display: flex;
            gap: 4px;
            background: #f1f5f9;
            border-radius: 60px;
            padding: 4px;
        }
        .view-toggle .btn {
            border-radius: 40px;
            border: none;
            background: transparent;
            padding: 6px 16px;
            font-weight: 500;
            font-size: 13px;
        }
        .view-toggle .btn.active {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .range-label {
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            white-space: nowrap;
        }

        .date-control {
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            padding: 4px 14px 4px 16px;
        }
        .date-control label {
            font-size: 12px;
            color: #64748b;
            font-weight: 500;
        }
        .date-control input[type="date"] {
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: #1e293b;
            background: transparent;
        }
        .date-control input[type="date"]:focus { outline: none; }

        .calendar-grid {
            display: grid;
            gap: 14px;
            margin-top: 12px;
        }
        .month-view {
            grid-template-columns: repeat(5, 1fr);
        }
        .week-view {
            grid-template-columns: repeat(7, 1fr);
        }
        .day-view {
            grid-template-columns: 1fr;
        }

        .day-card {
            background: white;
            border-radius: 20px;
            padding: 16px 14px;
            border: 1px solid #eef2f6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.25s ease;
            animation: fadeUp 0.3s ease forwards;
        }
        .day-card:hover {
            border-color: #cbd5e1;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            transform: translateY(-3px);
        }
        .day-number {
            font-weight: 600;
            font-size: 18px;
            color: #1e293b;
            margin-bottom: 2px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .day-number small {
            font-weight: 400;
            font-size: 13px;
            color: #64748b;
        }
        .day-date {
            font-size: 12px;
            color: #8b5cf6;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .topic-title {
            font-weight: 600;
            font-size: 15px;
            margin: 8px 0 4px;
            color: #0f172a;
        }
        .topic-raw {
            font-size: 13px;
            color: #475569;
            margin-bottom: 10px;
            background: #f8fafc;
            padding: 6px 10px;
            border-radius: 12px;
        }
        .platform-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin: 4px 4px 4px 0;
        }
        .tag-ig {
            background: #fce4ec;
            color: #c62828;
        }
        .tag-yt {
            background: #ffebee;
            color: #b71c1c;
        }
        .tag-li {
            background: #e3f2fd;
            color: #0d47a1;
        }
        .tag-all {
            background: #e8f5e9;
            color: #1b5e20;
        }

        .audience-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin: 4px 4px 4px 0;
        }
        .aud-client {
            background: #fff7ed;
            color: #c2410c;
            border: 1px solid #fed7aa;
        }
        .aud-student {
            background: #eef2ff;
            color: #4338ca;
            border: 1px solid #c7d2fe;
        }

        .hook-text {
            font-size: 13px;
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 14px;
            margin: 6px 0;
            color: #1e293b;
            border-left: 3px solid #2563eb;
        }
        .desc-text {
            font-size: 13px;
            color: #334155;
            margin: 6px 0;
            word-break: break-word;
        }
        .cta-text {
            font-size: 12px;
            font-weight: 600;
            color: #059669;
            margin: 6px 0;
            background: #ecfdf5;
            padding: 6px 10px;
            border-radius: 12px;
            display: inline-block;
        }
        .hashtags {
            font-size: 12px;
            color: #2563eb;
            font-weight: 500;
        }

        .design-thumb {
            width: 100%;
            border-radius: 14px;
            margin: 8px 0;
            border: 1px solid #eef2f6;
            cursor: pointer;
            display: block;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 32px;
            padding: 32px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: fadeUp 0.25s ease;
            box-shadow: 0 30px 80px rgba(0,0,0,0.15);
        }
        .modal.wide {
            max-width: 1080px;
        }
        .modal h2 {
            margin-bottom: 20px;
            font-size: 22px;
        }
        .modal label {
            font-weight: 500;
            font-size: 14px;
            display: block;
            margin: 12px 0 4px;
        }
        .modal input, .modal textarea, .modal select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: 0.2s;
        }
        .modal input:focus, .modal textarea:focus, .modal select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .modal textarea {
            min-height: 60px;
            resize: vertical;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .flex {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .gap-1 {
            gap: 4px;
        }
        .text-muted {
            color: #64748b;
            font-size: 13px;
        }
        .hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }

        /* Design studio layout */
        .design-studio {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
        }
        @media (max-width: 760px) {
            .design-studio {
                grid-template-columns: 1fr;
            }
        }
        .design-canvas-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .design-canvas-wrap canvas {
            width: 100%;
            max-width: 380px;
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            background: #111;
        }
        .design-fields {
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 6px;
        }
        .design-fields h4 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            margin: 16px 0 6px;
        }
        .design-fields h4:first-child {
            margin-top: 0;
        }
        .field-row {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }
        .field-row input[type="color"] {
            width: 40px;
            padding: 2px;
            height: 36px;
            flex: 0 0 40px;
        }
        .text-block-card {
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .text-block-card .field-row input, .text-block-card .field-row select {
            font-size: 12px;
            padding: 8px 10px;
        }
        .remove-block {
            background: #fee2e2;
            color: #b91c1c;
            border: none;
            border-radius: 10px;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
        }
        .ai-status {
            font-size: 12px;
            color: #7c3aed;
            min-height: 16px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.error {
            background: #b91c1c;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(16px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 860px) {
            .month-view { grid-template-columns: repeat(3, 1fr); }
            .week-view { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 540px) {
            .app { padding: 16px; }
            .month-view { grid-template-columns: 1fr; }
            .week-view { grid-template-columns: 1fr; }
            .header h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="app" id="app">
    <div class="header">
        <h1><i class="fas fa-calendar-alt"></i> Content Planner</h1>
        <div class="controls">
            <div class="view-toggle">
                <button class="btn active" data-view="month"><i class="fas fa-calendar-week"></i> Month</button>
                <button class="btn" data-view="week"><i class="fas fa-calendar-day"></i> Week</button>
                <button class="btn" data-view="day"><i class="fas fa-list-ul"></i> Day</button>
            </div>
            <span class="range-label" id="rangeLabel"></span>
            <div class="date-control">
                <label for="startDateInput">Day 1 =</label>
                <input type="date" id="startDateInput">
            </div>
            <button class="btn btn-refresh" id="refreshData" title="Reload from storage"><i class="fas fa-sync-alt"></i></button>
            <button class="btn btn-outline" id="openSettings" title="API settings"><i class="fas fa-gear"></i></button>
            <a class="btn btn-outline" href="index.html"><i class="fas fa-arrow-left"></i> Overview</a>
            <button class="btn btn-primary" id="openAddModal"><i class="fas fa-plus"></i> Add</button>
            <button class="btn btn-outline" id="exportData"><i class="fas fa-download"></i> Export</button>
            <button class="btn btn-outline" id="importData"><i class="fas fa-upload"></i> Import</button>
            <input type="file" id="fileInput" accept=".json" style="display:none">
        </div>
    </div>

    <div class="calendar-grid month-view" id="calendarGrid"></div>
</div>

<!-- ADD/EDIT CONTENT MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2 id="modalTitle">Add Content</h2>
        <input type="hidden" id="editId" />
        <label>Day (1-31)</label>
        <input type="number" id="formDay" min="1" max="31" value="1" />
        <label>Raw Idea</label>
        <input type="text" id="formRaw" placeholder="e.g. Why I stopped paying for hosting" />
        <label>Refined Title</label>
        <input type="text" id="formRefined" placeholder="e.g. I Saved ₹36,000/Year by Ditching Hosting" />
        <label>Audience (client or student)</label>
        <input type="text" id="formAudience" placeholder="client / student" />
        <label>Platforms (comma separated: ig, yt, li, all)</label>
        <input type="text" id="formPlatforms" value="ig, yt, li" />
        <label>Hook (for all platforms)</label>
        <textarea id="formHook" rows="2" placeholder="Short hook that grabs attention..."></textarea>
        <label>Description / Body</label>
        <textarea id="formDesc" rows="3" placeholder="Full description or post body..."></textarea>
        <label>Call To Action</label>
        <input type="text" id="formCta" placeholder="e.g. DM 'WHATSAPP' for a free quote" />
        <label>Hashtags</label>
        <input type="text" id="formHashtags" placeholder="#content #marketing #growth" />
        <div class="modal-actions">
            <button class="btn btn-outline" id="closeModal">Cancel</button>
            <button class="btn btn-primary" id="saveContent">Save</button>
        </div>
    </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsOverlay">
    <div class="modal">
        <h2><i class="fas fa-gear"></i> AI API Settings</h2>
        <label>API Endpoint</label>
        <input type="text" id="settingsBaseUrl" placeholder="https://smagents.vercel.app/api/chat" />
        <div class="hint">This must be a POST endpoint accepting <code>{model, messages}</code> and returning an OpenAI-style chat completion. CORS must be open on the endpoint (yours already is).</div>
        <label>Model</label>
        <select id="settingsModel">
            <option value="deepseek-ai/deepseek-v4-flash">deepseek-ai/deepseek-v4-flash (fast)</option>
            <option value="deepseek-ai/deepseek-v4-pro">deepseek-ai/deepseek-v4-pro (higher quality)</option>
            <option value="meta/llama-3.3-70b-instruct">meta/llama-3.3-70b-instruct</option>
            <option value="moonshotai/kimi-k2.6">moonshotai/kimi-k2.6</option>
            <option value="mistralai/mistral-large-3-675b-instruct-2512">mistralai/mistral-large-3-675b-instruct-2512</option>
        </select>
        <div class="modal-actions">
            <button class="btn btn-outline" id="closeSettings">Cancel</button>
            <button class="btn btn-primary" id="saveSettings">Save</button>
        </div>
    </div>
</div>

<!-- DESIGN STUDIO MODAL -->
<div class="modal-overlay" id="designOverlay">
    <div class="modal wide">
        <h2><i class="fas fa-wand-magic-sparkles"></i> Design Studio <span id="designDayLabel" class="text-muted" style="font-size:14px;font-weight:400;"></span></h2>
        <div class="flex" style="margin-bottom:10px;">
            <button class="btn btn-ai btn-sm" id="aiGenerateDesign"><i class="fas fa-sparkles"></i> Generate with AI</button>
            <span class="ai-status" id="designAiStatus"></span>
        </div>
        <div class="design-studio">
            <div class="design-fields" id="designFields"></div>
            <div class="design-canvas-wrap">
                <canvas id="designCanvas" width="1080" height="1350"></canvas>
                <div class="flex">
                    <select id="canvasPreset" style="width:auto;">
                        <option value="1080x1350">Portrait 4:5</option>
                        <option value="1080x1080">Square 1:1</option>
                        <option value="1080x1920">Story 9:16</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" id="closeDesign">Close</button>
            <button class="btn btn-outline" id="addTextBlockBtn"><i class="fas fa-plus"></i> Text block</button>
            <button class="btn btn-outline" id="exportDesignPng"><i class="fas fa-download"></i> Export PNG</button>
            <button class="btn btn-design" id="saveDesignToCard"><i class="fas fa-save"></i> Save to card</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ================================================================
    // CONSTANTS
    // ================================================================
    const FONTS = ['Inter','DM Sans','Space Mono','Bebas Neue','Playfair Display','Oswald','Montserrat','Raleway','Syne'];
    const DEFAULT_API = { baseUrl: 'https://smagents.vercel.app/api/chat', model: 'deepseek-ai/deepseek-v4-flash' };

    let contentData = [];
    let apiConfig = { ...DEFAULT_API };
    let calendarConfig = { startDate: null };
    let designImages = {}; // { itemId: dataUrl }

    function toast(msg, type = 'success') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `toast show ${type === 'error' ? 'error' : ''}`;
        setTimeout(() => el.className = 'toast', 3200);
    }

    // ================================================================
    // STORAGE (persistent artifact storage — shared with index.html)
    // ================================================================
    async function storageGet(key, fallback = null) {
        try {
            const res = await window.storage.get(key, false);
            return res ? JSON.parse(res.value) : fallback;
        } catch (e) { return fallback; }
    }
    async function storageSet(key, value) {
        try { await window.storage.set(key, JSON.stringify(value), false); } catch (e) { console.error('storage set failed', e); }
    }
    async function storageDelete(key) {
        try { await window.storage.delete(key, false); } catch (e) {}
    }

    // ================================================================
    // DATE HELPERS — "Day N" maps onto a real calendar date
    // ================================================================
    function pad2(n) { return String(n).padStart(2, '0'); }
    function isoDate(d) { return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`; }
    function parseISO(str) {
        const [y, m, d] = str.split('-').map(Number);
        return new Date(y, m - 1, d);
    }
    function defaultStartDate() {
        const t = new Date();
        return isoDate(new Date(t.getFullYear(), t.getMonth(), 1)); // 1st of current month
    }
    function dateForDay(dayNum) {
        const start = parseISO(calendarConfig.startDate || defaultStartDate());
        return new Date(start.getFullYear(), start.getMonth(), start.getDate() + (dayNum - 1));
    }
    function fmtShort(d) { return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }); }
    function fmtFull(d) { return d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }); }
    function daysBetween(a, b) {
        const A = new Date(a.getFullYear(), a.getMonth(), a.getDate());
        const B = new Date(b.getFullYear(), b.getMonth(), b.getDate());
        return Math.round((B - A) / 86400000);
    }
    function currentDayIndex() {
        const start = parseISO(calendarConfig.startDate || defaultStartDate());
        const idx = daysBetween(start, new Date()) + 1;
        return Math.max(1, Math.min(31, idx));
    }

    // ================================================================
    // DEMO DATA (kept in sync with index.html so first load on either
    // page seeds the same shared dataset)
    // ================================================================

    async function loadData() {
        const stored = await storageGet('contentData', null);
        if (stored && Array.isArray(stored) && stored.length) {
            contentData = stored;
        } else {
            contentData = addDemoData();
            await storageSet('contentData', contentData);
        }
        const cfg = await storageGet('apiConfig', null);
        apiConfig = cfg && cfg.baseUrl ? cfg : { ...DEFAULT_API };

        const calCfg = await storageGet('calendarConfig', null);
        if (calCfg && calCfg.startDate) {
            calendarConfig = calCfg;
        } else {
            calendarConfig = { startDate: defaultStartDate() };
            await storageSet('calendarConfig', calendarConfig);
        }

        // load any saved design thumbnails
        designImages = {};
        try {
            const list = await window.storage.list('design:', false);
            if (list && list.keys) {
                for (const key of list.keys) {
                    const id = key.replace('design:', '');
                    const res = await window.storage.get(key, false);
                    if (res) designImages[id] = res.value;
                }
            }
        } catch (e) { /* no designs yet */ }
    }

    async function saveData() {
        await storageSet('contentData', contentData);
        renderCalendar();
    }

    async function saveCalendarConfig() {
        await storageSet('calendarConfig', calendarConfig);
        renderCalendar();
    }

    function getDayData(day) { return contentData.filter(item => item.day === day); }

    async function addContent(item) { contentData.push(item); await saveData(); }
    async function updateContent(id, updated) {
        const index = contentData.findIndex(item => item.id === id);
        if (index !== -1) { contentData[index] = { ...contentData[index], ...updated }; await saveData(); }
    }
    async function deleteContent(id) {
        contentData = contentData.filter(item => item.id !== id);
        delete designImages[id];
        await storageDelete(`design:${id}`);
        await saveData();
    }

    // AI CALLS
    // ================================================================
    async function callAI(messages, { temperature = 0.8, max_tokens = 900 } = {}) {
        if (!apiConfig.baseUrl) throw new Error('No API endpoint configured — open Settings (gear icon)');
        const res = await fetch(apiConfig.baseUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: apiConfig.model, messages, stream: false, temperature, max_tokens })
        });
        if (!res.ok) {
            let detail = '';
            try { detail = JSON.stringify(await res.json()); } catch (e) {}
            throw new Error(`API error ${res.status} ${detail}`.slice(0, 200));
        }
        const data = await res.json();
        const text = data.choices?.[0]?.message?.content;
        if (!text) throw new Error('Empty response from model');
        return text;
    }

    function parseJsonFromModel(text) {
        let cleaned = text.trim();
        cleaned = cleaned.replace(/^```(json)?/i, '').replace(/```$/, '').trim();
        const start = cleaned.indexOf('{');
        const end = cleaned.lastIndexOf('}');
        if (start !== -1 && end !== -1) cleaned = cleaned.slice(start, end + 1);
        return JSON.parse(cleaned);
    }

    async function generateContentAI(id) {
        const item = contentData.find(d => d.id === id);
        if (!item) return;
        if (!item.raw) { toast('Add a raw idea first', 'error'); return; }
        const btn = document.querySelector(`[data-ai-write="${id}"]`);
        if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Writing...'; }
        try {
            const sys = `You are a senior short-form content strategist for social media. Given a raw idea, audience type, and target platforms, write scroll-stopping content. Output ONLY a single valid JSON object, no markdown, no commentary, no code fences, with exactly these keys: refined (string, a punchy title under 110 characters), hook (string, 1-2 sentences, the first line that grabs attention), description (string, 2-4 sentences, the post body), cta (string, one specific call to action), hashtags (string, 4-6 relevant hashtags separated by spaces).`;
            const user = `Raw idea: ${item.raw}\nAudience: ${item.audience || 'general'}\nPlatforms: ${(item.platforms || []).join(', ') || 'all'}`;
            const text = await callAI([{ role: 'system', content: sys }, { role: 'user', content: user }]);
            const json = parseJsonFromModel(text);
            await updateContent(id, {
                refined: json.refined || item.refined,
                hook: json.hook || item.hook,
                description: json.description || item.description,
                cta: json.cta || item.cta,
                hashtags: json.hashtags || item.hashtags
            });
            toast('Content generated');
        } catch (err) {
            console.error(err);
            toast(`AI write failed: ${err.message}`, 'error');
        } finally {
            renderCalendar();
        }
    }

        if (bgColor) bgColor.addEventListener('input', () => { designSpec.bg.color = bgColor.value; redrawCanvas(); });
        const bgC1 = document.getElementById('bgC1'), bgC2 = document.getElementById('bgC2'), bgAngle = document.getElementById('bgAngle');
        if (bgC1) bgC1.addEventListener('input', () => { designSpec.bg.c1 = bgC1.value; redrawCanvas(); });
        if (bgC2) bgC2.addEventListener('input', () => { designSpec.bg.c2 = bgC2.value; redrawCanvas(); });
        if (bgAngle) bgAngle.addEventListener('input', () => { designSpec.bg.angle = parseFloat(bgAngle.value) || 0; redrawCanvas(); });

        wrap.querySelectorAll('.text-block-card').forEach(card => {
            const i = parseInt(card.dataset.blockIndex);
            const b = designSpec.textBlocks[i];
            card.querySelector('.tb-text').addEventListener('input', e => { b.text = e.target.value; redrawCanvas(); });
            card.querySelector('.tb-font').addEventListener('change', e => { b.font = e.target.value; redrawCanvas(); });
            card.querySelector('.tb-size').addEventListener('input', e => { b.size = parseFloat(e.target.value) || 30; redrawCanvas(); });
            card.querySelector('.tb-color').addEventListener('input', e => { b.color = e.target.value; redrawCanvas(); });
            card.querySelector('.tb-align').addEventListener('change', e => { b.align = e.target.value; redrawCanvas(); });
            card.querySelector('.tb-x').addEventListener('input', e => { b.x = parseFloat(e.target.value) || 0; redrawCanvas(); });
            card.querySelector('.tb-y').addEventListener('input', e => { b.y = parseFloat(e.target.value) || 0; redrawCanvas(); });
            card.querySelector('.tb-maxw').addEventListener('input', e => { b.maxWidth = parseFloat(e.target.value) || 80; redrawCanvas(); });
        });
        wrap.querySelectorAll('[data-remove-block]').forEach(btn => {
            btn.addEventListener('click', () => {
                designSpec.textBlocks.splice(parseInt(btn.dataset.removeBlock), 1);
                renderDesignFields();
                redrawCanvas();
            });
        });

        const iconUrls = document.getElementById('iconUrls');
        if (iconUrls) iconUrls.addEventListener('input', () => {
            const urls = iconUrls.value.split(',').map(s => s.trim()).filter(Boolean);
            designSpec.icons = urls.map((url, idx) => {
                const existing = (designSpec.icons || [])[idx];
                return existing && existing.url === url ? existing : { url, x: 15 + idx * 22, y: 14, size: 70 };
            });
            redrawCanvas();
        });

        const brandText = document.getElementById('brandText'), brandColor = document.getElementById('brandColor');
        if (brandText) brandText.addEventListener('input', () => { designSpec.brand = designSpec.brand || {}; designSpec.brand.text = brandText.value; redrawCanvas(); });
        if (brandColor) brandColor.addEventListener('input', () => { designSpec.brand = designSpec.brand || {}; designSpec.brand.color = brandColor.value; redrawCanvas(); });
    }

    function loadImage(url) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => resolve(img);
            img.onerror = () => reject(new Error('image failed: ' + url));
            img.src = url;
        });
    }

    function wrapLines(ctx, text, maxWidthPx) {
        const words = (text || '').split(/\s+/).filter(Boolean);
        const lines = [];
        let line = '';
        for (const w of words) {
            const test = line ? line + ' ' + w : w;
            if (ctx.measureText(test).width > maxWidthPx && line) { lines.push(line); line = w; }
            else line = test;
        }
        if (line) lines.push(line);
        return lines.length ? lines : [''];
    }

    async function redrawCanvas() {
        if (!designSpec) return;
        const canvas = document.getElementById('designCanvas');
        const W = designSpec.canvasW || 1080, H = designSpec.canvasH || 1350;
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');

        try { await document.fonts.ready; } catch (e) {}

        // background
        if (designSpec.bg.type === 'solid') {
            ctx.fillStyle = designSpec.bg.color || '#111827';
            ctx.fillRect(0, 0, W, H);
        } else {
            const angle = ((designSpec.bg.angle || 135) * Math.PI) / 180;
            const x1 = W / 2 - Math.cos(angle) * W, y1 = H / 2 - Math.sin(angle) * H;
            const x2 = W / 2 + Math.cos(angle) * W, y2 = H / 2 + Math.sin(angle) * H;
            const grad = ctx.createLinearGradient(x1, y1, x2, y2);
            grad.addColorStop(0, designSpec.bg.c1 || '#1e1b4b');
            grad.addColorStop(1, designSpec.bg.c2 || '#312e81');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
        }

        // icons
        for (const icon of (designSpec.icons || [])) {
            try {
                const img = await loadImage(icon.url);
                const s = icon.size || 70;
                ctx.drawImage(img, (icon.x / 100) * W - s / 2, (icon.y / 100) * H - s / 2, s, s);
            } catch (e) { /* skip broken icon */ }
        }

        // text blocks
        for (const b of (designSpec.textBlocks || [])) {
            const x = (b.x / 100) * W, y = (b.y / 100) * H;
            const maxWidthPx = ((b.maxWidth || 80) / 100) * W;
            ctx.font = `${b.weight || 600} ${b.size || 40}px "${b.font || 'Inter'}"`;
            ctx.fillStyle = b.color || '#ffffff';
            ctx.textAlign = b.align || 'center';
            ctx.textBaseline = 'middle';
            const lines = wrapLines(ctx, b.text, maxWidthPx);
            const lineHeight = (b.size || 40) * 1.22;
            const startY = y - ((lines.length - 1) * lineHeight) / 2;
            lines.forEach((l, i) => ctx.fillText(l, x, startY + i * lineHeight));
        }

        // brand
        if (designSpec.brand && designSpec.brand.text) {
            ctx.font = `600 ${designSpec.brand.size || 22}px Inter`;
            ctx.fillStyle = designSpec.brand.color || '#a5b4fc';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'bottom';
            ctx.fillText(designSpec.brand.text, 50, H - 40);
        }
    }

    async function aiGenerateDesign() {
        if (!currentDesignItemId) return;
        const item = contentData.find(d => d.id === currentDesignItemId);
        const statusEl = document.getElementById('designAiStatus');
        statusEl.textContent = 'Designing...';
        const btn = document.getElementById('aiGenerateDesign');
        btn.disabled = true;
        try {
            const sys = `You are a social media graphic designer. Output ONLY a single valid JSON object, no markdown, no commentary, no code fences, matching exactly this schema:
{
 "bg": {"type":"solid"|"linear","color":"#hex","c1":"#hex","c2":"#hex","angle":number},
 "textBlocks": [{"text":string,"x":number(0-100),"y":number(0-100),"font":one of [${FONTS.join(', ')}],"size":number(18-90),"weight":400|500|600|700|800,"color":"#hex","align":"left"|"center"|"right","maxWidth":number(40-95)}],
 "icons": [{"url":"https://img.icons8.com/fluency/96/ICONNAME.png","x":number(0-100),"y":number(0-100),"size":number(40-120)}],
 "brand": {"text":string,"color":"#hex","size":number}
}
Rules: produce 2-3 textBlocks max (headline, hook/subtitle, optional small caption). Pick a bold gradient or solid background that fits the platform and audience tone. Add 0-4 relevant icons from img.icons8.com using real plausible icon names. Keep all text within canvas bounds (canvas is ${designSpec.canvasW}x${designSpec.canvasH}px) and do not let text blocks overlap vertically.`;
            const user = `Title: ${item.refined || item.raw}\nHook: ${item.hook || ''}\nDescription: ${item.description || ''}\nAudience: ${item.audience || 'general'}\nPlatforms: ${(item.platforms || []).join(', ') || 'all'}`;
            const text = await callAI([{ role: 'system', content: sys }, { role: 'user', content: user }], { temperature: 0.9 });
            const json = parseJsonFromModel(text);
            designSpec.bg = json.bg || designSpec.bg;
            designSpec.textBlocks = (json.textBlocks || []).map((b, i) => ({ id: 't' + i, ...b }));
            designSpec.icons = json.icons || [];
            designSpec.brand = json.brand || designSpec.brand;
            renderDesignFields();
            await redrawCanvas();
            statusEl.textContent = 'Done';
            setTimeout(() => statusEl.textContent = '', 1500);
        } catch (err) {
            console.error(err);
            statusEl.textContent = '';
            toast(`AI design failed: ${err.message}`, 'error');
        } finally {
            btn.disabled = false;
        }
    }

    async function exportDesignPNG() {
        const canvas = document.getElementById('designCanvas');
        try {
            const dataUrl = canvas.toDataURL('image/png');
            const item = contentData.find(d => d.id === currentDesignItemId);
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = `day${item ? item.day : 'x'}_design.png`;
            a.click();
        } catch (err) {
            toast('Export blocked — one of the icon images may not allow canvas export (CORS). Try removing icons and export again.', 'error');
        }
    }

    async function saveDesignToCard() {
        if (!currentDesignItemId) return;
        const canvas = document.getElementById('designCanvas');
        try {
            const dataUrl = canvas.toDataURL('image/png');
            designImages[currentDesignItemId] = dataUrl;
            await storageSet(`design:${currentDesignItemId}`, dataUrl);
            await updateContent(currentDesignItemId, { designSpec: JSON.parse(JSON.stringify(designSpec)) });
            toast('Design saved to card');
            closeDesignModal();
        } catch (err) {
            toast(`Save failed: ${err.message}`, 'error');
        }
    }

    // ================================================================
    // RENDER CALENDAR
    // ================================================================
    let currentView = 'month';

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.className = `calendar-grid ${currentView}-view`;
        grid.innerHTML = '';

        let daysToShow = [];
        const rangeLabel = document.getElementById('rangeLabel');

        if (currentView === 'month') {
            for (let d = 1; d <= 31; d++) daysToShow.push(d);
            rangeLabel.textContent = `${fmtShort(dateForDay(1))} – ${fmtShort(dateForDay(31))}`;
        } else if (currentView === 'week') {
            const idx = currentDayIndex();
            const start = Math.max(1, Math.min(25, idx - 3));
            const end = Math.min(31, start + 6);
            for (let d = start; d <= end; d++) daysToShow.push(d);
            rangeLabel.textContent = `${fmtShort(dateForDay(start))} – ${fmtShort(dateForDay(end))}`;
        } else {
            const idx = currentDayIndex();
            daysToShow = [idx];
            rangeLabel.textContent = fmtFull(dateForDay(idx));
        }

        daysToShow.forEach(day => {
            const items = getDayData(day);
            const card = document.createElement('div');
            card.className = 'day-card';

            const dayHeader = document.createElement('div');
            dayHeader.className = 'day-number';
            dayHeader.innerHTML = `<span>Day ${day}</span> <small>${items.length} items</small>`;
            card.appendChild(dayHeader);

            const dateLine = document.createElement('div');
            dateLine.className = 'day-date';
            dateLine.textContent = fmtShort(dateForDay(day));
            card.appendChild(dateLine);

            if (items.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'text-muted';
                empty.style.padding = '8px 0';
                empty.textContent = 'No content planned';
                card.appendChild(empty);
            } else {
                items.forEach(item => {
                    const wrapper = document.createElement('div');
                    wrapper.style.marginBottom = '12px';
                    wrapper.style.borderBottom = '1px solid #f1f5f9';
                    wrapper.style.paddingBottom = '10px';

                    const raw = document.createElement('div');
                    raw.className = 'topic-raw';
                    raw.textContent = `📌 ${item.raw}`;
                    wrapper.appendChild(raw);

                    const refined = document.createElement('div');
                    refined.className = 'topic-title';
                    refined.textContent = item.refined || item.raw;
                    wrapper.appendChild(refined);

                    const tagRow = document.createElement('div');
                    tagRow.className = 'flex gap-1';
                    if (item.audience) {
                        const audTag = document.createElement('span');
                        audTag.className = `audience-tag aud-${item.audience}`;
                        audTag.textContent = item.audience;
                        tagRow.appendChild(audTag);
                    }
                    (item.platforms || ['all']).forEach(p => {
                        const tag = document.createElement('span');
                        tag.className = `platform-tag tag-${p}`;
                        tag.textContent = p.toUpperCase();
                        tagRow.appendChild(tag);
                    });
                    wrapper.appendChild(tagRow);

                    if (item.hook) {
                        const hook = document.createElement('div');
                        hook.className = 'hook-text';
                        hook.innerHTML = `<i class="fas fa-bolt" style="color:#2563eb;margin-right:6px;"></i> ${item.hook}`;
                        wrapper.appendChild(hook);
                    }
                    if (item.description) {
                        const desc = document.createElement('div');
                        desc.className = 'desc-text';
                        desc.textContent = item.description;
                        wrapper.appendChild(desc);
                    }
                    if (item.cta) {
                        const cta = document.createElement('div');
                        cta.className = 'cta-text';
                        cta.innerHTML = `<i class="fas fa-arrow-right" style="margin-right:6px;"></i> ${item.cta}`;
                        wrapper.appendChild(cta);
                    }
                    if (item.hashtags) {
                        const hash = document.createElement('div');
                        hash.className = 'hashtags';
                        hash.textContent = item.hashtags;
                        wrapper.appendChild(hash);
                    }

                    if (designImages[item.id]) {
                        const thumb = document.createElement('img');
                        thumb.className = 'design-thumb';
                        thumb.src = designImages[item.id];
                        thumb.title = 'Click to edit design';
                        thumb.onclick = () => openDesignModal(item.id);
                        wrapper.appendChild(thumb);
                    }

                    const actions = document.createElement('div');
                    actions.className = 'flex';
                    actions.style.marginTop = '8px';

                    const aiBtn = document.createElement('button');
                    aiBtn.className = 'btn btn-sm btn-ai';
                    aiBtn.setAttribute('data-ai-write', item.id);
                    aiBtn.innerHTML = '<i class="fas fa-wand-magic-sparkles"></i> AI Write';
                    aiBtn.onclick = () => generateContentAI(item.id);

                    const designBtn = document.createElement('button');
                    designBtn.className = 'btn btn-sm btn-design';
                    designBtn.innerHTML = '<i class="fas fa-image"></i> Design';
                    designBtn.onclick = () => openDesignModal(item.id);

                    const editBtn = document.createElement('button');
                    editBtn.className = 'btn btn-sm btn-outline';
                    editBtn.innerHTML = '<i class="fas fa-edit"></i>';
                    editBtn.onclick = () => openEditModal(item.id);

                    const delBtn = document.createElement('button');
                    delBtn.className = 'btn btn-sm btn-danger';
                    delBtn.innerHTML = '<i class="fas fa-trash"></i>';
                    delBtn.onclick = () => { if (confirm('Delete this?')) deleteContent(item.id); };

                    actions.appendChild(aiBtn);
                    actions.appendChild(designBtn);
                    actions.appendChild(editBtn);
                    actions.appendChild(delBtn);
                    wrapper.appendChild(actions);
                    card.appendChild(wrapper);
                });
            }

            const addBtn = document.createElement('button');
            addBtn.className = 'btn btn-sm btn-outline';
            addBtn.style.marginTop = '4px';
            addBtn.innerHTML = '<i class="fas fa-plus"></i> Add to this day';
            addBtn.onclick = () => openAddModal(day);
            card.appendChild(addBtn);
            grid.appendChild(card);
        });
    }

    // ================================================================
    // ADD/EDIT MODAL LOGIC
    // ================================================================
    let isEditing = false;
    let editId = null;

    function openAddModal(day = null) {
        isEditing = false;
        editId = null;
        document.getElementById('modalTitle').textContent = 'Add Content';
        document.getElementById('editId').value = '';
        document.getElementById('formDay').value = day || currentDayIndex();
        document.getElementById('formRaw').value = '';
        document.getElementById('formRefined').value = '';
        document.getElementById('formAudience').value = '';
        document.getElementById('formPlatforms').value = 'ig, yt, li';
        document.getElementById('formHook').value = '';
        document.getElementById('formDesc').value = '';
        document.getElementById('formCta').value = '';
        document.getElementById('formHashtags').value = '';
        document.getElementById('modalOverlay').classList.add('show');
    }

    function openEditModal(id) {
        const item = contentData.find(d => d.id === id);
        if (!item) return;
        isEditing = true;
        editId = id;
        document.getElementById('modalTitle').textContent = 'Edit Content';
        document.getElementById('editId').value = id;
        document.getElementById('formDay').value = item.day;
        document.getElementById('formRaw').value = item.raw || '';
        document.getElementById('formRefined').value = item.refined || '';
        document.getElementById('formAudience').value = item.audience || '';
        document.getElementById('formPlatforms').value = (item.platforms || []).join(', ');
        document.getElementById('formHook').value = item.hook || '';
        document.getElementById('formDesc').value = item.description || '';
        document.getElementById('formCta').value = item.cta || '';
        document.getElementById('formHashtags').value = item.hashtags || '';
        document.getElementById('modalOverlay').classList.add('show');
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

    async function saveFromModal() {
        const day = Math.max(1, Math.min(31, parseInt(document.getElementById('formDay').value) || 1));
        const raw = document.getElementById('formRaw').value.trim();
        const refined = document.getElementById('formRefined').value.trim();
        const audience = document.getElementById('formAudience').value.trim().toLowerCase();
        const platforms = document.getElementById('formPlatforms').value.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
        const hook = document.getElementById('formHook').value.trim();
        const description = document.getElementById('formDesc').value.trim();
        const cta = document.getElementById('formCta').value.trim();
        const hashtags = document.getElementById('formHashtags').value.trim();

        if (!raw) { alert('Raw idea is required'); return; }

        const data = { day, raw, refined, audience, platforms, hook, description, cta, hashtags };
        if (isEditing && editId) {
            await updateContent(editId, data);
        } else {
            data.id = genId();
            await addContent(data);
        }
        closeModal();
    }

    // ================================================================
    // SETTINGS MODAL
    // ================================================================
    function openSettings() {
        document.getElementById('settingsBaseUrl').value = apiConfig.baseUrl || DEFAULT_API.baseUrl;
        document.getElementById('settingsModel').value = apiConfig.model || DEFAULT_API.model;
        document.getElementById('settingsOverlay').classList.add('show');
    }
    function closeSettings() { document.getElementById('settingsOverlay').classList.remove('show'); }
    async function saveSettings() {
        apiConfig = {
            baseUrl: document.getElementById('settingsBaseUrl').value.trim() || DEFAULT_API.baseUrl,
            model: document.getElementById('settingsModel').value
        };
        await storageSet('apiConfig', apiConfig);
        closeSettings();
        toast('Settings saved');
    }

    // ================================================================
    // IMPORT / EXPORT / REFRESH
    // ================================================================
    function exportData() {
        const blob = new Blob([JSON.stringify(contentData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `content-planner-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importData(file) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    contentData = imported;
                    await saveData();
                    toast('Import successful!');
                } else {
                    toast('Invalid JSON format. Expected an array.', 'error');
                }
            } catch (err) {
                toast('Error parsing JSON: ' + err.message, 'error');
            }
        };
        reader.readAsText(file);
    }

    async function refreshData() {
        await loadData();
        renderCalendar();
        toast('Reloaded from storage');
    }

    // ================================================================
    // VIEW TOGGLE
    // ================================================================
    function setView(view) {
        currentView = view;
        document.querySelectorAll('.view-toggle .btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.view-toggle .btn[data-view="${view}"]`).classList.add('active');
        renderCalendar();
    }

    // ================================================================
    // INIT
    // ================================================================
    document.addEventListener('DOMContentLoaded', async function() {
        await loadData();
        document.getElementById('startDateInput').value = calendarConfig.startDate;
        renderCalendar();

        document.querySelectorAll('.view-toggle .btn').forEach(btn => {
            btn.addEventListener('click', () => setView(btn.dataset.view));
        });

        document.getElementById('startDateInput').addEventListener('change', async (e) => {
            if (!e.target.value) return;
            calendarConfig.startDate = e.target.value;
            await saveCalendarConfig();
        });

        document.getElementById('refreshData').addEventListener('click', refreshData);
        document.getElementById('openAddModal').addEventListener('click', () => openAddModal());
        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('saveContent').addEventListener('click', saveFromModal);
        document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });

        document.getElementById('openSettings').addEventListener('click', openSettings);
        document.getElementById('closeSettings').addEventListener('click', closeSettings);
        document.getElementById('saveSettings').addEventListener('click', saveSettings);
        document.getElementById('settingsOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeSettings(); });

        document.getElementById('closeDesign').addEventListener('click', closeDesignModal);
        document.getElementById('designOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeDesignModal(); });
        document.getElementById('aiGenerateDesign').addEventListener('click', aiGenerateDesign);
        document.getElementById('exportDesignPng').addEventListener('click', exportDesignPNG);
        document.getElementById('saveDesignToCard').addEventListener('click', saveDesignToCard);
        document.getElementById('addTextBlockBtn').addEventListener('click', () => {
            designSpec.textBlocks.push({ id: 't' + Date.now(), text: 'New text', x: 50, y: 75, font: 'Inter', size: 28, weight: 600, color: '#ffffff', align: 'center', maxWidth: 80 });
            renderDesignFields();
            redrawCanvas();
        });
        document.getElementById('canvasPreset').addEventListener('change', (e) => {
            const [w, h] = e.target.value.split('x').map(Number);
            designSpec.canvasW = w; designSpec.canvasH = h;
            redrawCanvas();
        });

        document.getElementById('exportData').addEventListener('click', exportData);
        document.getElementById('importData').addEventListener('click', () => document.getElementById('fileInput').click());
        document.getElementById('fileInput').addEventListener('change', (e) => {
            if (e.target.files.length) { importData(e.target.files[0]); e.target.value = ''; }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { closeModal(); closeSettings(); closeDesignModal(); }
        });
    });
</script>
