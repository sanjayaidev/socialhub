<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Planner · Monthly Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Playfair+Display:wght@600;700&family=Oswald:wght@400;600&family=Montserrat:wght@500;700;800&family=Raleway:wght@500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6fa;
            color: #1e1e2f;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .app {
            max-width: 1440px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 28px 32px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.4);
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            gap: 16px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 600;
            background: linear-gradient(145deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 i { font-size: 28px; background: none; -webkit-text-fill-color: #2563eb; }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 60px;
            font-weight: 500;
            font-size: 14px;
            background: white;
            color: #1e1e2f;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: #2563eb; color: white; border: none; box-shadow: 0 4px 12px rgba(37,99,235,0.25); }
        .btn-primary:hover { background: #1d4ed8; transform: scale(0.97); }
        .btn-outline { background: transparent; border: 1px solid #cbd5e1; }
        .btn-outline:hover { background: #f1f5f9; }
        .btn-danger { background: #dc2626; color: white; border: none; }
        .btn-sm { padding: 4px 14px; font-size: 12px; }
        .btn-refresh { background: #8b5cf6; color: white; border: none; }
        .btn-refresh:hover { background: #7c3aed; }
        .btn-ai { background: linear-gradient(135deg, #7c3aed, #ec4899); color: white; border: none; }
        .btn-ai:hover { opacity: 0.92; transform: scale(0.97); }
        .btn-design { background: #0f172a; color: white; border: none; }
        .btn-design:hover { background: #1e293b; }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none !important; }

        .view-toggle { display: flex; gap: 4px; background: #f1f5f9; border-radius: 60px; padding: 4px; }
        .view-toggle .btn { border-radius: 40px; border: none; background: transparent; padding: 6px 16px; font-weight: 500; font-size: 13px; }
        .view-toggle .btn.active { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

        .nav-controls { display: flex; gap: 6px; align-items: center; }
        .nav-controls .btn { padding: 6px 12px; font-size: 13px; }
        .nav-label { font-size: 14px; font-weight: 500; color: #475569; min-width: 130px; text-align: center; }

        .month-year-picker {
            display: flex;
            align-items: center;
            gap: 2px;
            background: #f1f5f9;
            border-radius: 60px;
            padding: 4px 6px;
        }
        .month-year-picker button { background: transparent; border: none; cursor: pointer; color: #475569; padding: 4px 8px; font-size: 13px; border-radius: 30px; }
        .month-year-picker button:hover { background: white; }
        .month-year-picker select { border: none; background: transparent; font-weight: 600; font-size: 13px; padding: 4px 4px; cursor: pointer; }
        .month-year-picker .year-label { font-weight: 600; font-size: 13px; min-width: 38px; text-align: center; color: #1e293b; }

        .calendar-grid { margin-top: 12px; }
        .month-view { display: block; }
        .week-view { display: grid; grid-template-columns: repeat(7, 1fr); gap: 14px; }
        .day-view { display: grid; grid-template-columns: 1fr; gap: 14px; }

        .weekday-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 8px; }
        .weekday-header span { text-align: center; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; }
        .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .cal-cell {
            background: white;
            border-radius: 16px;
            border: 1px solid #eef2f6;
            padding: 8px 10px;
            min-height: 100px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }
        .cal-cell:hover { border-color: #cbd5e1; box-shadow: 0 6px 18px rgba(0,0,0,0.05); transform: translateY(-2px); }
        .cal-cell.outside { opacity: 0.35; }
        .cal-cell.outside:hover { transform: none; box-shadow: none; border-color: #eef2f6; }
        .cal-cell.today { border: 2px solid #2563eb; }
        .cal-cell.selected { background: #eff6ff; border-color: #2563eb; }
        .cal-date { font-weight: 600; font-size: 13px; color: #1e293b; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .count-badge { background: #e2e8f0; color: #475569; font-size: 10px; font-weight: 700; border-radius: 20px; padding: 1px 7px; }
        .cal-item-chip { font-size: 10px; padding: 2px 6px; border-radius: 8px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
        .cal-item-chip .dot { width: 6px; height: 6px; border-radius: 50%; flex: 0 0 6px; }
        .cal-more { font-size: 10px; color: #94a3b8; margin-top: 2px; }

        .day-detail-panel { margin-top: 22px; border-top: 1px solid #eef2f6; padding-top: 18px; }
        .day-detail-header { font-size: 16px; font-weight: 600; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .day-detail-empty { color: #94a3b8; font-size: 13px; text-align: center; padding: 20px 0; }
        .day-detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        @media (max-width: 760px) { .day-detail-grid { grid-template-columns: 1fr; } }

        .day-card {
            background: white;
            border-radius: 20px;
            padding: 16px 14px;
            border: 1px solid #eef2f6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.25s ease;
            animation: fadeUp 0.3s ease forwards;
        }
        .day-card:hover { border-color: #cbd5e1; box-shadow: 0 8px 24px rgba(0,0,0,0.04); transform: translateY(-3px); }
        .day-number { font-weight: 600; font-size: 18px; color: #1e293b; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .day-number small { font-weight: 400; font-size: 13px; color: #64748b; }
        .topic-title { font-weight: 600; font-size: 15px; margin: 8px 0 4px; color: #0f172a; }
        .topic-raw { font-size: 13px; color: #475569; margin-bottom: 10px; background: #f8fafc; padding: 6px 10px; border-radius: 12px; }
        .platform-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 12px; border-radius: 30px; text-transform: uppercase; letter-spacing: 0.3px; margin: 4px 4px 4px 0; }
        .tag-ig { background: #fce4ec; color: #c62828; }
        .tag-yt { background: #ffebee; color: #b71c1c; }
        .tag-li { background: #e3f2fd; color: #0d47a1; }
        .tag-all { background: #e8f5e9; color: #1b5e20; }

        .audience-tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 12px; border-radius: 30px; text-transform: uppercase; letter-spacing: 0.3px; margin: 4px 4px 4px 0; }
        .aud-client { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
        .aud-student { background: #eef2ff; color: #4338ca; border: 1px solid #c7d2fe; }

        .hook-text { font-size: 13px; background: #f1f5f9; padding: 8px 12px; border-radius: 14px; margin: 6px 0; color: #1e293b; border-left: 3px solid #2563eb; }
        .desc-text { font-size: 13px; color: #334155; margin: 6px 0; word-break: break-word; }
        .cta-text { font-size: 12px; font-weight: 600; color: #059669; margin: 6px 0; background: #ecfdf5; padding: 6px 10px; border-radius: 12px; display: inline-block; }
        .hashtags { font-size: 12px; color: #2563eb; font-weight: 500; }

        .design-thumb { width: 100%; border-radius: 14px; margin: 8px 0; border: 1px solid #eef2f6; cursor: pointer; display: block; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white; border-radius: 32px; padding: 32px; max-width: 700px; width: 90%;
            max-height: 90vh; overflow-y: auto; animation: fadeUp 0.25s ease; box-shadow: 0 30px 80px rgba(0,0,0,0.15);
        }
        .modal.wide { max-width: 1080px; }
        .modal h2 { margin-bottom: 20px; font-size: 22px; }
        .modal label { font-weight: 500; font-size: 14px; display: block; margin: 12px 0 4px; }
        .modal input, .modal textarea, .modal select {
            width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 16px;
            font-family: 'Inter', sans-serif; font-size: 14px; transition: 0.2s;
        }
        .modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .modal textarea { min-height: 60px; resize: vertical; }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; flex-wrap: wrap; }
        .modal-row { display: flex; gap: 10px; }
        .modal-row > div { flex: 1; }

        .flex { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .gap-1 { gap: 4px; }
        .text-muted { color: #64748b; font-size: 13px; }
        .hint { font-size: 12px; color: #94a3b8; margin-top: 4px; }

        .design-studio { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
        @media (max-width: 760px) { .design-studio { grid-template-columns: 1fr; } }
        .design-canvas-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .design-canvas-wrap canvas { width: 100%; max-width: 380px; border-radius: 14px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); background: #111; }
        .design-fields { max-height: 60vh; overflow-y: auto; padding-right: 6px; }
        .design-fields h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; margin: 16px 0 6px; }
        .design-fields h4:first-child { margin-top: 0; }
        .field-row { display: flex; gap: 6px; margin-bottom: 6px; }
        .field-row input[type="color"] { width: 40px; padding: 2px; height: 36px; flex: 0 0 40px; }
        .text-block-card { border: 1px solid #e2e8f0; border-radius: 14px; padding: 10px; margin-bottom: 10px; }
        .text-block-card .field-row input, .text-block-card .field-row select { font-size: 12px; padding: 8px 10px; }
        .remove-block { background: #fee2e2; color: #b91c1c; border: none; border-radius: 10px; padding: 4px 8px; font-size: 11px; cursor: pointer; }
        .ai-status { font-size: 12px; color: #7c3aed; min-height: 16px; }

        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: #1e293b; color: white; padding: 10px 20px; border-radius: 30px; font-size: 13px;
            opacity: 0; transition: all 0.3s; z-index: 2000; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: #b91c1c; }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(16px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 860px) {
            .month-grid { grid-template-columns: repeat(7, 1fr); }
            .week-view { grid-template-columns: repeat(3, 1fr); }
            .cal-cell { min-height: 70px; }
        }
        @media (max-width: 540px) {
            .app { padding: 16px; }
            .week-view { grid-template-columns: 1fr; }
            .header h1 { font-size: 20px; }
            .cal-item-chip { display: none; }
        }
    </style>
</head>
<body>

<div class="app" id="app">
    <div class="header">
        <h1><i class="fas fa-calendar-alt"></i> Content Planner</h1>
        <div class="controls">
            <div class="view-toggle">
                <button class="btn active" data-view="month"><i class="fas fa-calendar-week"></i> Month</button>
                <button class="btn" data-view="week"><i class="fas fa-calendar-day"></i> Week</button>
                <button class="btn" data-view="day"><i class="fas fa-list-ul"></i> Day</button>
            </div>
            <div class="month-year-picker">
                <button id="yearPrev" title="Previous year"><i class="fas fa-angles-left"></i></button>
                <span class="year-label" id="yearLabel">2026</span>
                <button id="yearNext" title="Next year"><i class="fas fa-angles-right"></i></button>
                <select id="monthSelect"></select>
            </div>
            <div class="nav-controls">
                <button class="btn btn-outline" id="navPrev"><i class="fas fa-chevron-left"></i></button>
                <span class="nav-label" id="navLabel">Month</span>
                <button class="btn btn-outline" id="navNext"><i class="fas fa-chevron-right"></i></button>
            </div>
            <button class="btn btn-refresh" id="refreshData" title="Reload from storage"><i class="fas fa-sync-alt"></i></button>
            <button class="btn btn-outline" id="openSettings" title="API settings"><i class="fas fa-gear"></i></button>
            <button class="btn btn-primary" id="openAddModal"><i class="fas fa-plus"></i> Add</button>
            <button class="btn btn-outline" id="exportData"><i class="fas fa-download"></i> Export</button>
            <button class="btn btn-outline" id="importData"><i class="fas fa-upload"></i> Import</button>
            <input type="file" id="fileInput" accept=".json" style="display:none">
        </div>
    </div>

    <div class="calendar-grid month-view" id="calendarGrid"></div>
    <div class="day-detail-panel" id="dayDetailPanel"></div>
</div>

<!-- ADD/EDIT CONTENT MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2 id="modalTitle">Add Content</h2>
        <input type="hidden" id="editId" />
        <div class="modal-row">
            <div>
                <label>Month</label>
                <select id="formMonth"></select>
            </div>
            <div>
                <label>Day</label>
                <input type="number" id="formDay" min="1" max="31" value="1" />
            </div>
        </div>
        <label>Raw Idea</label>
        <input type="text" id="formRaw" placeholder="e.g. Why I stopped paying for hosting" />
        <label>Refined Title</label>
        <input type="text" id="formRefined" placeholder="e.g. I Saved ₹36,000/Year by Ditching Hosting" />
        <label>Audience (client or student)</label>
        <input type="text" id="formAudience" placeholder="client / student" />
        <label>Platforms (comma separated: ig, yt, li, all)</label>
        <input type="text" id="formPlatforms" value="ig, yt, li" />
        <label>Hook (for all platforms)</label>
        <textarea id="formHook" rows="2" placeholder="Short hook that grabs attention..."></textarea>
        <label>Description / Body</label>
        <textarea id="formDesc" rows="3" placeholder="Full description or post body..."></textarea>
        <label>Call To Action</label>
        <input type="text" id="formCta" placeholder="e.g. DM 'WHATSAPP' for a free quote" />
        <label>Hashtags</label>
        <input type="text" id="formHashtags" placeholder="#content #marketing #growth" />
        <div class="modal-actions">
            <button class="btn btn-outline" id="closeModal">Cancel</button>
            <button class="btn btn-primary" id="saveContent">Save</button>
        </div>
    </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsOverlay">
    <div class="modal">
        <h2><i class="fas fa-gear"></i> AI API Settings</h2>
        <label>API Endpoint</label>
        <input type="text" id="settingsBaseUrl" placeholder="https://smagents.vercel.app/api/chat" />
        <div class="hint">This must be a POST endpoint accepting <code>{model, messages}</code> and returning an OpenAI-style chat completion. CORS must be open on the endpoint (yours already is).</div>
        <label>Model</label>
        <select id="settingsModel">
            <option value="deepseek-ai/deepseek-v4-flash">deepseek-ai/deepseek-v4-flash (fast)</option>
            <option value="deepseek-ai/deepseek-v4-pro">deepseek-ai/deepseek-v4-pro (higher quality)</option>
            <option value="meta/llama-3.3-70b-instruct">meta/llama-3.3-70b-instruct</option>
            <option value="moonshotai/kimi-k2.6">moonshotai/kimi-k2.6</option>
            <option value="mistralai/mistral-large-3-675b-instruct-2512">mistralai/mistral-large-3-675b-instruct-2512</option>
        </select>
        <div class="modal-actions">
            <button class="btn btn-outline" id="closeSettings">Cancel</button>
            <button class="btn btn-primary" id="saveSettings">Save</button>
        </div>
    </div>
</div>

<!-- DESIGN STUDIO MODAL -->
<div class="modal-overlay" id="designOverlay">
    <div class="modal wide">
        <h2><i class="fas fa-wand-magic-sparkles"></i> Design Studio <span id="designDayLabel" class="text-muted" style="font-size:14px;font-weight:400;"></span></h2>
        <div class="flex" style="margin-bottom:10px;">
            <button class="btn btn-ai btn-sm" id="aiGenerateDesign"><i class="fas fa-sparkles"></i> Generate with AI</button>
            <span class="ai-status" id="designAiStatus"></span>
        </div>
        <div class="design-studio">
            <div class="design-fields" id="designFields"></div>
            <div class="design-canvas-wrap">
                <canvas id="designCanvas" width="1080" height="1350"></canvas>
                <div class="flex">
                    <select id="canvasPreset" style="width:auto;">
                        <option value="1080x1350">Portrait 4:5</option>
                        <option value="1080x1080">Square 1:1</option>
                        <option value="1080x1920">Story 9:16</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" id="closeDesign">Close</button>
            <button class="btn btn-outline" id="addTextBlockBtn"><i class="fas fa-plus"></i> Text block</button>
            <button class="btn btn-outline" id="exportDesignPng"><i class="fas fa-download"></i> Export PNG</button>
            <button class="btn btn-design" id="saveDesignToCard"><i class="fas fa-save"></i> Save to card</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ================================================================
    // CONSTANTS
    // ================================================================
    const FONTS = ['Inter','DM Sans','Space Mono','Bebas Neue','Playfair Display','Oswald','Montserrat','Raleway','Syne'];
    const DEFAULT_API = { baseUrl: 'https://smagents.vercel.app/api/chat', model: 'deepseek-ai/deepseek-v4-flash' };
    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const WEEKDAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    let contentData = [];
    let apiConfig = { ...DEFAULT_API };
    let designImages = {}; // { itemId: dataUrl }

    function toast(msg, type = 'success') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `toast show ${type === 'error' ? 'error' : ''}`;
        setTimeout(() => el.className = 'toast', 3200);
    }

    // ================================================================
    // DATE HELPERS
    // ================================================================
    function daysInMonth(year, month) { return new Date(year, month, 0).getDate(); } // month is 1-12
    function firstWeekdayOfMonth(year, month) { return new Date(year, month - 1, 1).getDay(); }
    function addMonths(date, n) {
        const d = new Date(date);
        d.setDate(1);
        d.setMonth(d.getMonth() + n);
        return d;
    }
    function addDays(date, n) {
        const d = new Date(date);
        d.setDate(d.getDate() + n);
        return d;
    }
    function getWeekDates(date) {
        const d = new Date(date);
        d.setDate(d.getDate() - d.getDay());
        const week = [];
        for (let i = 0; i < 7; i++) { week.push(new Date(d)); d.setDate(d.getDate() + 1); }
        return week;
    }
    function fmtShort(d) { return `${MONTH_NAMES[d.getMonth()].slice(0,3)} ${d.getDate()}`; }
    function fmtRange(start, end) {
        if (start.getMonth() === end.getMonth()) return `${fmtShort(start)}–${end.getDate()}, ${start.getFullYear()}`;
        return `${fmtShort(start)} – ${fmtShort(end)}, ${end.getFullYear()}`;
    }

    // ================================================================
    // STORAGE (persistent artifact storage — no localStorage)
    // ================================================================
    async function storageGet(key, fallback = null) {
        try {
            const res = await window.storage.get(key, false);
            return res ? JSON.parse(res.value) : fallback;
        } catch (e) { return fallback; }
    }
    async function storageSet(key, value) {
        try { await window.storage.set(key, JSON.stringify(value), false); } catch (e) { console.error('storage set failed', e); }
    }
    async function storageDelete(key) {
        try { await window.storage.delete(key, false); } catch (e) {}
    }

    // ================================================================
    // DEMO DATA (placed in Month 7 / July since it needs all 31 days)
    // ================================================================
    function addDemoData() {
        return [

    async function callAI(messages, { temperature = 0.8, max_tokens = 900 } = {}) {
        if (!apiConfig.baseUrl) throw new Error('No API endpoint configured — open Settings (gear icon)');
        const res = await fetch(apiConfig.baseUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: apiConfig.model, messages, stream: false, temperature, max_tokens })
        });
        if (!res.ok) {
            let detail = '';
            try { detail = JSON.stringify(await res.json()); } catch (e) {}
            throw new Error(`API error ${res.status} ${detail}`.slice(0, 200));
        }
        const data = await res.json();
        const text = data.choices?.[0]?.message?.content;
        if (!text) throw new Error('Empty response from model');
        return text;
    }

    function parseJsonFromModel(text) {
        let cleaned = text.trim();
        cleaned = cleaned.replace(/^```(json)?/i, '').replace(/```$/, '').trim();
        const start = cleaned.indexOf('{');
        const end = cleaned.lastIndexOf('}');
        if (start !== -1 && end !== -1) cleaned = cleaned.slice(start, end + 1);
        return JSON.parse(cleaned);
    }

        const item = contentData.find(d => d.id === id);

        const btn = document.querySelector(`[data-ai-write="${id}"]`);
        if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Writing...'; }
        try {
            const sys = `You are a senior short-form content strategist for social media. Given a raw idea, audience type, and target platforms, write scroll-stopping content. Output ONLY a single valid JSON object, no markdown, no commentary, no code fences, with exactly these keys: refined (string, a punchy title under 110 characters), hook (string, 1-2 sentences, the first line that grabs attention), description (string, 2-4 sentences, the post body), cta (string, one specific call to action), hashtags (string, 4-6 relevant hashtags separated by spaces).`;
            const user = `Raw idea: ${item.raw}\nAudience: ${item.audience || 'general'}\nPlatforms: ${(item.platforms || []).join(', ') || 'all'}`;
            const text = await callAI([{ role: 'system', content: sys }, { role: 'user', content: user }]);
            const json = parseJsonFromModel(text);
            await updateContent(id, {
                refined: json.refined || item.refined,

    function loadImage(url) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => resolve(img);
            img.onerror = () => reject(new Error('image failed: ' + url));
            img.src = url;
        });
    }

    function wrapLines(ctx, text, maxWidthPx) {
        const words = (text || '').split(/\s+/).filter(Boolean);
        const lines = [];
        let line = '';
        for (const w of words) {
            const test = line ? line + ' ' + w : w;
            if (ctx.measureText(test).width > maxWidthPx && line) { lines.push(line); line = w; }
            else line = test;
        }
        if (line) lines.push(line);
        return lines.length ? lines : [''];
    }

    async function redrawCanvas() {
        if (!designSpec) return;
        const canvas = document.getElementById('designCanvas');
        const W = designSpec.canvasW || 1080, H = designSpec.canvasH || 1350;
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');

        try { await document.fonts.ready; } catch (e) {}

        if (designSpec.bg.type === 'solid') {
            ctx.fillStyle = designSpec.bg.color || '#111827';
            ctx.fillRect(0, 0, W, H);
        } else {
            const angle = ((designSpec.bg.angle || 135) * Math.PI) / 180;
            const x1 = W / 2 - Math.cos(angle) * W, y1 = H / 2 - Math.sin(angle) * H;
            const x2 = W / 2 + Math.cos(angle) * W, y2 = H / 2 + Math.sin(angle) * H;
            const grad = ctx.createLinearGradient(x1, y1, x2, y2);
            grad.addColorStop(0, designSpec.bg.c1 || '#1e1b4b');
            grad.addColorStop(1, designSpec.bg.c2 || '#312e81');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
        }

        for (const icon of (designSpec.icons || [])) {
            try {
                const img = await loadImage(icon.url);
                const s = icon.size || 70;
                ctx.drawImage(img, (icon.x / 100) * W - s / 2, (icon.y / 100) * H - s / 2, s, s);
            } catch (e) { /* skip broken icon */ }
        }

        for (const b of (designSpec.textBlocks || [])) {
            const x = (b.x / 100) * W, y = (b.y / 100) * H;
            const maxWidthPx = ((b.maxWidth || 80) / 100) * W;
            ctx.font = `${b.weight || 600} ${b.size || 40}px "${b.font || 'Inter'}"`;
            ctx.fillStyle = b.color || '#ffffff';
            ctx.textAlign = b.align || 'center';
            ctx.textBaseline = 'middle';
            const lines = wrapLines(ctx, b.text, maxWidthPx);
            const lineHeight = (b.size || 40) * 1.22;
            const startY = y - ((lines.length - 1) * lineHeight) / 2;
            lines.forEach((l, i) => ctx.fillText(l, x, startY + i * lineHeight));
        }

        if (designSpec.brand && designSpec.brand.text) {
            ctx.font = `600 ${designSpec.brand.size || 22}px Inter`;
            ctx.fillStyle = designSpec.brand.color || '#a5b4fc';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'bottom';
            ctx.fillText(designSpec.brand.text, 50, H - 40);
        }
    }

        card.appendChild(dayHeader);

        if (items.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'text-muted';
            empty.style.padding = '8px 0';
            empty.textContent = 'No content planned';
            card.appendChild(empty);
        } else {
            items.forEach(item => card.appendChild(buildItemCard(item)));
        }

        const addBtn = document.createElement('button');
        addBtn.className = 'btn btn-sm btn-outline';
        addBtn.style.marginTop = '4px';
        addBtn.innerHTML = '<i class="fas fa-plus"></i> Add to this day';
        addBtn.onclick = () => openAddModal(month, day);
        card.appendChild(addBtn);

        return card;
    }

    // ================================================================
    // RENDER: MONTH VIEW (real calendar grid)
    // ================================================================
    function renderMonthGrid() {
        const grid = document.getElementById('calendarGrid');
        grid.className = 'calendar-grid month-view';

        const year = cursorDate.getFullYear();
        const month = cursorDate.getMonth() + 1;
        document.getElementById('navLabel').textContent = `${MONTH_NAMES[month-1]} ${year}`;

        const weekdayRow = document.createElement('div');
        weekdayRow.className = 'weekday-header';
        WEEKDAY_NAMES.forEach(w => {
            const s = document.createElement('span');
            s.textContent = w;
            weekdayRow.appendChild(s);
        });
        grid.appendChild(weekdayRow);

        const cellsWrap = document.createElement('div');
        cellsWrap.className = 'month-grid';

        const totalDays = daysInMonth(year, month);
        const startOffset = firstWeekdayOfMonth(year, month);
        const prevMonth = month === 1 ? 12 : month - 1;
        const prevYear = month === 1 ? year - 1 : year;
        const prevMonthDays = daysInMonth(prevYear, prevMonth);

        const today = new Date();
        const isRealCurrentMonth = today.getFullYear() === year && today.getMonth() + 1 === month;
        const totalCells = Math.ceil((startOffset + totalDays) / 7) * 7;

        for (let i = 0; i < totalCells; i++) {
            const cell = document.createElement('div');
            let dayNum, isOutside = false, outsideDir = 0;

            if (i < startOffset) {
                dayNum = prevMonthDays - startOffset + i + 1;
                isOutside = true;
                outsideDir = -1;
            } else if (i >= startOffset + totalDays) {
                dayNum = i - startOffset - totalDays + 1;
                isOutside = true;
                outsideDir = 1;
            } else {
                dayNum = i - startOffset + 1;
            }

            cell.className = 'cal-cell' + (isOutside ? ' outside' : '');
            if (!isOutside && isRealCurrentMonth && dayNum === today.getDate()) cell.classList.add('today');
            if (!isOutside && selectedDetail && selectedDetail.month === month && selectedDetail.day === dayNum) cell.classList.add('selected');

            const items = isOutside ? [] : getDayData(month, dayNum);

            const dateRow = document.createElement('div');
            dateRow.className = 'cal-date';
            dateRow.innerHTML = `<span>${dayNum}</span>` + (items.length ? `<span class="count-badge">${items.length}</span>` : '');
            cell.appendChild(dateRow);

            items.slice(0, 2).forEach(item => {
                const chip = document.createElement('div');
                chip.className = 'cal-item-chip';
                const color = item.audience === 'client' ? { bg: '#fff7ed', fg: '#c2410c', dot: '#f97316' }
                            : item.audience === 'student' ? { bg: '#eef2ff', fg: '#4338ca', dot: '#6366f1' }
                            : { bg: '#f1f5f9', fg: '#475569', dot: '#94a3b8' };
                chip.style.background = color.bg;
                chip.style.color = color.fg;
                chip.innerHTML = `<span class="dot" style="background:${color.dot}"></span>${(item.refined || item.raw || '').slice(0, 22)}`;
                cell.appendChild(chip);
            });
            if (items.length > 2) {
                const more = document.createElement('div');
                more.className = 'cal-more';
                more.textContent = `+${items.length - 2} more`;
                cell.appendChild(more);
            }
            if (designImages[(items[0] || {}).id]) {
                // small visual hint that a design exists for the first item
                const dot = document.createElement('div');
                dot.style.fontSize = '10px';
                dot.style.color = '#0f172a';
                dot.innerHTML = '<i class="fas fa-image"></i>';
                cell.appendChild(dot);
            }

            if (isOutside) {
                cell.onclick = () => { cursorDate = addMonths(cursorDate, outsideDir); selectedDetail = null; renderCalendar(); };
            } else {
                cell.onclick = () => { selectedDetail = { month, day: dayNum }; renderCalendar(); };
            }

            cellsWrap.appendChild(cell);
        }

        grid.appendChild(cellsWrap);
        renderDayDetailPanel();
    }

    function renderDayDetailPanel() {
        const panel = document.getElementById('dayDetailPanel');
        panel.innerHTML = '';
        if (currentView !== 'month') return;

        if (!selectedDetail) {
            const empty = document.createElement('div');
            empty.className = 'day-detail-empty';
            empty.textContent = 'Click a day on the calendar to see or add content for it.';
            panel.appendChild(empty);
            return;
        }

        const { month: dMonth, day: dDay } = selectedDetail;
        const items = getDayData(dMonth, dDay);

        const header = document.createElement('div');
        header.className = 'day-detail-header';
        header.innerHTML = `<span>${MONTH_NAMES[dMonth-1]} ${dDay} — ${items.length} item${items.length === 1 ? '' : 's'}</span>`;
        const addBtn = document.createElement('button');
        addBtn.className = 'btn btn-sm btn-primary';
        addBtn.innerHTML = '<i class="fas fa-plus"></i> Add to this day';
        addBtn.onclick = () => openAddModal(dMonth, dDay);
        header.appendChild(addBtn);
        panel.appendChild(header);

        if (items.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'day-detail-empty';
            empty.textContent = 'No content planned for this day yet.';
            panel.appendChild(empty);
        } else {
            const itemsGrid = document.createElement('div');
            itemsGrid.className = 'day-detail-grid';
            items.forEach(item => itemsGrid.appendChild(buildItemCard(item)));
            panel.appendChild(itemsGrid);
        }
    }

    // ================================================================
    // RENDER: WEEK / DAY VIEWS
    // ================================================================
    function renderWeekView() {
        const grid = document.getElementById('calendarGrid');
        grid.className = 'calendar-grid week-view';
        const week = getWeekDates(cursorDate);
        document.getElementById('navLabel').textContent = fmtRange(week[0], week[6]);
        week.forEach(d => grid.appendChild(buildDayCard(d.getMonth() + 1, d.getDate(), d)));
    }

    function renderDayView() {
        const grid = document.getElementById('calendarGrid');
        grid.className = 'calendar-grid day-view';
        document.getElementById('navLabel').textContent = `${WEEKDAY_NAMES[cursorDate.getDay()]}, ${fmtShort(cursorDate)}, ${cursorDate.getFullYear()}`;
        grid.appendChild(buildDayCard(cursorDate.getMonth() + 1, cursorDate.getDate(), cursorDate));
    }

    // ================================================================
    // RENDER DISPATCH
    // ================================================================
    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const panel = document.getElementById('dayDetailPanel');
        if (currentView !== 'month') panel.innerHTML = '';
        syncPickerUI();

        if (currentView === 'month') renderMonthGrid();
        else if (currentView === 'week') renderWeekView();
        else renderDayView();
    }

    // ================================================================
    // MONTH / YEAR PICKER
    // ================================================================
    function populateMonthSelect() {
        const sel = document.getElementById('monthSelect');
        sel.innerHTML = MONTH_NAMES.map((m, i) => `<option value="${i+1}">${m}</option>`).join('');
    }
    function syncPickerUI() {
        document.getElementById('monthSelect').value = cursorDate.getMonth() + 1;
        document.getElementById('yearLabel').textContent = cursorDate.getFullYear();
    }

    // ================================================================
    // ADD/EDIT MODAL LOGIC
    // ================================================================
    let isEditing = false;
    let editId = null;

    function populateFormMonth() {
        const sel = document.getElementById('formMonth');
        sel.innerHTML = MONTH_NAMES.map((m, i) => `<option value="${i+1}">${m}</option>`).join('');
    }

    function syncDayMaxToMonth() {
        const monthVal = parseInt(document.getElementById('formMonth').value) || 1;
        const max = daysInMonth(cursorDate.getFullYear(), monthVal);
        const dayInput = document.getElementById('formDay');
        dayInput.max = max;
        if (parseInt(dayInput.value) > max) dayInput.value = max;
    }

    function openAddModal(month = null, day = null) {
        isEditing = false;
        editId = null;
        document.getElementById('modalTitle').textContent = 'Add Content';
        document.getElementById('editId').value = '';
        document.getElementById('formMonth').value = month || (cursorDate.getMonth() + 1);
        document.getElementById('formDay').value = day || cursorDate.getDate();
        syncDayMaxToMonth();
        document.getElementById('formRaw').value = '';
        document.getElementById('formRefined').value = '';
        document.getElementById('formAudience').value = '';
        document.getElementById('formPlatforms').value = 'ig, yt, li';
        document.getElementById('formHook').value = '';
        document.getElementById('formDesc').value = '';
        document.getElementById('formCta').value = '';
        document.getElementById('formHashtags').value = '';
        document.getElementById('modalOverlay').classList.add('show');
    }

    function openEditModal(id) {
        const item = contentData.find(d => d.id === id);
        if (!item) return;
        isEditing = true;
        editId = id;
        document.getElementById('modalTitle').textContent = 'Edit Content';
        document.getElementById('editId').value = id;
        document.getElementById('formMonth').value = item.month || 7;
        document.getElementById('formDay').value = item.day;
        syncDayMaxToMonth();
        document.getElementById('formRaw').value = item.raw || '';
        document.getElementById('formRefined').value = item.refined || '';
        document.getElementById('formAudience').value = item.audience || '';
        document.getElementById('formPlatforms').value = (item.platforms || []).join(', ');
        document.getElementById('formHook').value = item.hook || '';
        document.getElementById('formDesc').value = item.description || '';
        document.getElementById('formCta').value = item.cta || '';
        document.getElementById('formHashtags').value = item.hashtags || '';
        document.getElementById('modalOverlay').classList.add('show');
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

    async function saveFromModal() {
        const month = parseInt(document.getElementById('formMonth').value) || 1;
        const day = parseInt(document.getElementById('formDay').value) || 1;
        const raw = document.getElementById('formRaw').value.trim();
        const refined = document.getElementById('formRefined').value.trim();
        const audience = document.getElementById('formAudience').value.trim().toLowerCase();
        const platforms = document.getElementById('formPlatforms').value.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
        const hook = document.getElementById('formHook').value.trim();
        const description = document.getElementById('formDesc').value.trim();
        const cta = document.getElementById('formCta').value.trim();
        const hashtags = document.getElementById('formHashtags').value.trim();

        if (!raw) { alert('Raw idea is required'); return; }

        const data = { month, day, raw, refined, audience, platforms, hook, description, cta, hashtags };
        if (isEditing && editId) {
            await updateContent(editId, data);
        } else {
            data.id = genId();
            await addContent(data);
        }
        closeModal();
    }

    // ================================================================
    // SETTINGS MODAL
    // ================================================================
    function openSettings() {
        document.getElementById('settingsBaseUrl').value = apiConfig.baseUrl || DEFAULT_API.baseUrl;
        document.getElementById('settingsModel').value = apiConfig.model || DEFAULT_API.model;
        document.getElementById('settingsOverlay').classList.add('show');
    }
    function closeSettings() { document.getElementById('settingsOverlay').classList.remove('show'); }
    async function saveSettings() {
        apiConfig = {
            baseUrl: document.getElementById('settingsBaseUrl').value.trim() || DEFAULT_API.baseUrl,
            model: document.getElementById('settingsModel').value
        };
        await storageSet('apiConfig', apiConfig);
        closeSettings();
        toast('Settings saved');
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    function navPrev() {
        if (currentView === 'month') cursorDate = addMonths(cursorDate, -1);
        else if (currentView === 'week') cursorDate = addDays(cursorDate, -7);
        else cursorDate = addDays(cursorDate, -1);
        selectedDetail = null;
        renderCalendar();
    }
    function navNext() {
        if (currentView === 'month') cursorDate = addMonths(cursorDate, 1);
        else if (currentView === 'week') cursorDate = addDays(cursorDate, 7);
        else cursorDate = addDays(cursorDate, 1);
        selectedDetail = null;
        renderCalendar();
    }

    // ================================================================
    // IMPORT / EXPORT / REFRESH
    // ================================================================
    function exportData() {
        const blob = new Blob([JSON.stringify(contentData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `content-planner-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importData(file) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    contentData = imported;
                    contentData.forEach(item => { if (!item.month) item.month = 7; });
                    await saveData();
                    toast('Import successful!');
                } else {
                    toast('Invalid JSON format. Expected an array.', 'error');
                }
            } catch (err) {
                toast('Error parsing JSON: ' + err.message, 'error');
            }
        };
        reader.readAsText(file);
    }

    async function refreshData() {
        await loadData();
        renderCalendar();
    }

    // ================================================================
    // VIEW TOGGLE
    // ================================================================
    function setView(view) {
        currentView = view;
        selectedDetail = null;
        document.querySelectorAll('.view-toggle .btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.view-toggle .btn[data-view="${view}"]`).classList.add('active');
        renderCalendar();
    }

    // ================================================================
    // INIT
    // ================================================================
    document.addEventListener('DOMContentLoaded', async function() {
        populateMonthSelect();
        populateFormMonth();
        await loadData();
        renderCalendar();

        document.querySelectorAll('.view-toggle .btn').forEach(btn => {
            btn.addEventListener('click', () => setView(btn.dataset.view));
        });

        document.getElementById('navPrev').addEventListener('click', navPrev);
        document.getElementById('navNext').addEventListener('click', navNext);

        document.getElementById('monthSelect').addEventListener('change', (e) => {
            cursorDate = new Date(cursorDate.getFullYear(), parseInt(e.target.value) - 1, 1);
            selectedDetail = null;
            renderCalendar();
        });
        document.getElementById('yearPrev').addEventListener('click', () => {
            cursorDate = addMonths(cursorDate, -12);
            selectedDetail = null;
            renderCalendar();
        });
        document.getElementById('yearNext').addEventListener('click', () => {
            cursorDate = addMonths(cursorDate, 12);
            selectedDetail = null;
            renderCalendar();
        });

        document.getElementById('formMonth').addEventListener('change', syncDayMaxToMonth);

        document.getElementById('refreshData').addEventListener('click', refreshData);
        document.getElementById('openAddModal').addEventListener('click', () => openAddModal());
        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('saveContent').addEventListener('click', saveFromModal);
        document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });

        document.getElementById('openSettings').addEventListener('click', openSettings);
        document.getElementById('closeSettings').addEventListener('click', closeSettings);
        document.getElementById('saveSettings').addEventListener('click', saveSettings);
        document.getElementById('settingsOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeSettings(); });

        document.getElementById('closeDesign').addEventListener('click', closeDesignModal);
        document.getElementById('designOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeDesignModal(); });
        document.getElementById('aiGenerateDesign').addEventListener('click', aiGenerateDesign);
        document.getElementById('exportDesignPng').addEventListener('click', exportDesignPNG);
        document.getElementById('saveDesignToCard').addEventListener('click', saveDesignToCard);
        document.getElementById('addTextBlockBtn').addEventListener('click', () => {
            designSpec.textBlocks.push({ id: 't' + Date.now(), text: 'New text', x: 50, y: 75, font: 'Inter', size: 28, weight: 600, color: '#ffffff', align: 'center', maxWidth: 80 });
            renderDesignFields();
            redrawCanvas();
        });
        document.getElementById('canvasPreset').addEventListener('change', (e) => {
            const [w, h] = e.target.value.split('x').map(Number);
            designSpec.canvasW = w; designSpec.canvasH = h;
            redrawCanvas();
        });

        document.getElementById('exportData').addEventListener('click', exportData);
        document.getElementById('importData').addEventListener('click', () => document.getElementById('fileInput').click());
        document.getElementById('fileInput').addEventListener('change', (e) => {
            if (e.target.files.length) { importData(e.target.files[0]); e.target.value = ''; }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { closeModal(); closeSettings(); closeDesignModal(); }
        });
    });
</script>
</body>
</html>
